<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Casa de Iansã</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--dk:#1a1a2e;--dk2:#16213e;--dk3:#0f3460;--gold:#f0c040;--gold2:#e6a817;--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--orange:#f39c12;--purple:#9b59b6;--wpp:#25d366;--gray:#888;--lg:#f0f0f0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea,select{font-family:inherit}
.hdr{background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));color:#fff;padding:18px 16px 14px;border-radius:0 0 24px 24px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hdr-row img{width:40px;height:40px;border-radius:50%;background:#fff;padding:2px;object-fit:contain}
.hdr-nm{font-size:11px;letter-spacing:1px;opacity:.85;font-family:Georgia,serif;line-height:1.2}
.hdr-t{font-size:22px;font-weight:800;font-family:Georgia,serif;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-i{margin-top:3px;opacity:.7;font-size:12px}
.tbar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--dk),var(--dk2));display:flex;justify-content:space-around;padding:4px 0 max(6px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.1);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.tb{background:none;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:1px;font-size:9px;padding:3px 6px;transition:.2s}
.tb.on{color:var(--gold);font-weight:700;transform:scale(1.05)}
.tb .ic{font-size:18px}
.cd{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:10px}
.bt{width:100%;padding:12px 16px;border-radius:12px;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;margin-bottom:8px}
.bt:disabled{background:#ccc!important}
.bt .bi{font-size:18px}
.bt-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-flex;margin:0}
.gb{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.gA{background:var(--red)}.gB{background:var(--blue)}.gC{background:var(--green)}.gD{background:var(--orange)}
.ig{margin-bottom:12px}
.ig label{font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:3px}
.ig input,.ig textarea,.ig select{width:100%;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:15px;outline:none;transition:.2s}
.ig input:focus,.ig textarea:focus,.ig select:focus{border-color:var(--dk3)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.vis{display:flex}
.mc{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow:auto;padding:16px 14px max(14px,env(safe-area-inset-bottom));animation:su .3s ease}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mh h2{font-size:18px;font-weight:800;color:var(--dk)}
.mx{background:var(--lg);border-radius:50%;width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center}
.ch{padding:6px 14px;border-radius:18px;background:var(--lg);color:#666;font-weight:700;font-size:12px;white-space:nowrap}
.ch.on{background:var(--dk);color:#fff}
.fh{padding:8px 12px;border-radius:10px;color:#fff;font-weight:800;font-size:13px;margin-top:4px;margin-bottom:6px}
.sb{width:34px;height:34px;border-radius:8px;font-size:15px;background:var(--lg);transition:.15s}
.pg{height:4px;border-radius:2px;background:var(--lg);overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:2px;transition:width .5s}
.page{display:none}.page.on{display:block}
.ct{padding:14px;display:flex;flex-direction:column;gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.fx{display:flex}.fc{flex-direction:column}.ac{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.gp4{gap:4px}.gp6{gap:6px}.gp8{gap:8px}
.ng{background:linear-gradient(135deg,#fff9e6,#fff3cc);border:1px solid var(--gold);border-radius:14px;padding:14px}
.ng .nt{font-size:13px;font-weight:700;color:#8a6d00}
.ng .nd{font-size:12px;color:#8a6d00;margin-top:3px}
.wp{background:var(--lg);padding:10px;border-radius:10px;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:250px;overflow:auto;line-height:1.4;font-family:monospace}
.mc2{padding:5px 10px;border-radius:18px;border:1px solid #ddd;background:#f8f8f8;font-size:12px;display:inline-flex;align-items:center;gap:4px}
.aviso-card{background:linear-gradient(135deg,#fff9e6,#fffde8);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:8px}
.cal-item{padding:10px 12px;border-left:4px solid var(--blue);border-radius:0 10px 10px 0;background:#f8faff;margin-bottom:6px}
.chk-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.chk-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--green)}
.fix-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#e8f5e9;color:#2e7d32}
.login-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));padding:20px}
.loading{text-align:center;padding:40px;color:var(--gray)}
.loading .spin{display:inline-block;width:30px;height:30px;border:3px solid var(--lg);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="login-screen" class="login-bg">
<img id="login-logo" style="width:80px;height:80px;border-radius:50%;background:#fff;padding:4px;object-fit:contain;margin-bottom:16px" alt="Logo">
<div style="color:#fff;font-family:Georgia,serif;font-size:20px;font-weight:800;text-align:center;margin-bottom:4px">Centro Afro-Religioso</div>
<div style="color:var(--gold);font-family:Georgia,serif;font-size:24px;font-weight:800;text-align:center;margin-bottom:24px">Casa de Iansã</div>
<button id="btn-ef" class="bt" style="background:var(--green);max-width:280px"><span class="bi">👤</span> Entrar como Filho</button>
<button id="btn-ea" class="bt" style="background:var(--dk3);max-width:280px"><span class="bi">🔐</span> Entrar como Admin</button>
<div id="ls" style="display:none;margin-top:12px;width:100%;max-width:280px">
<div class="ig"><input id="inp-s" type="password" placeholder="Digite a senha" style="text-align:center;background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)"></div>
<button id="btn-lg" class="bt" style="background:var(--gold);color:var(--dk)"><span class="bi">🔓</span> Entrar</button>
<div id="lg-err" style="color:var(--red);text-align:center;font-size:12px;margin-top:6px;display:none">Senha incorreta!</div>
</div>
</div>
<div id="app" style="display:none">
<div id="p-home" class="page on"></div>
<div id="p-membros" class="page"></div>
<div id="p-tarefas" class="page"></div>
<div id="p-escala" class="page"></div>
<div class="tbar">
<button class="tb" data-pg="home"><div class="ic">🏠</div><div>Home</div></button>
<button class="tb" data-pg="membros"><div class="ic">👥</div><div>Membros</div></button>
<button class="tb" data-pg="tarefas"><div class="ic">📋</div><div>Tarefas</div></button>
<button class="tb" data-pg="escala"><div class="ic">📅</div><div>Escala</div></button>
</div>
</div>
<div id="mo" class="mo"><div id="mc" class="mc"></div></div>
<script>
var D={
  membros:[],nMid:1,tarefas:[],
  tiposEvento:[
    {id:1,nome:"Gira",cor:"#9b59b6"},
    {id:2,nome:"Festa",cor:"#f39c12"},
    {id:3,nome:"Reza",cor:"#3498db"},
    {id:4,nome:"Desenvolvimento",cor:"#2ecc71"}
  ],
  nTid:5,
  eventos:{},
  mensalidades:{},itensDoacao:[],sorteios:{},avisos:[],calendario:[]
},GR=["A","B","C","D"],GC={A:"var(--red)",B:"var(--blue)",C:"var(--green)",D:"var(--orange)"},FASES=["Antes","Durante","Depois"],U={admin:false},L="CASAIANSA_V3",eS={tipo:null,esc:[],sel:[]},pGid=null;
function sv(){localStorage.setItem(L,JSON.stringify(D))}
function ld(){var s=localStorage.getItem(L);if(s){try{D=JSON.parse(s)}catch(e){}}}
function esc(s){return(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function gb(g){return'<span class="gb g'+g+'">'+g+'</span>'}
function atv(){return D.membros.filter(function(m){return m.ativo})}
function shuf(a){var c=a.slice();for(var i=c.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=c[i];c[i]=c[j];c[j]=t}return c}
function mesAno(){var d=new Date();return(d.getMonth()+1).toString().padStart(2,"0")+"/"+d.getFullYear()}
function openM(t,c){document.getElementById("mc").innerHTML='<div class="mh"><h2>'+t+'</h2><button class="mx" onclick="closeM()">\u00D7</button></div>'+c;document.getElementById("mo").classList.add("vis")}
function closeM(){document.getElementById("mo").classList.remove("vis")}
function getTipoNome(tid){var t=D.tiposEvento.find(function(x){return x.id===tid});return t?t.nome:"Evento"}
function getTipoCor(tid){var t=D.tiposEvento.find(function(x){return x.id===tid});return t?t.cor:"#999"}

function rH(){
  var h='<div class="hdr"><div class="hdr-row"><img id="logo-h" alt="Logo"><div class="fc" style="flex:1"><div class="hdr-nm">CENTRO AFRO-RELIGIOSO</div><div class="hdr-t">Casa de Iansã</div></div></div><div class="hdr-i">✨ Axé, '+esc(U.nome||"Filho(a)")+'!</div></div><div class="ct">';
  if(U.admin){
    h+='<div class="cd"><button class="bt" id="btn-conf" style="background:var(--purple)">⚙️ Configurações</button></div>';
  }
  h+='<div class="cd"><div style="font-size:15px;font-weight:700;margin-bottom:8px">📢 Avisos</div>';
  if(D.avisos.length===0)h+='<div style="color:var(--gray);font-size:13px;text-align:center;padding:20px">Nenhum aviso</div>';
  else D.avisos.slice().reverse().forEach(function(av,i){
    h+='<div class="aviso-card"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:4px"><div style="font-weight:800;font-size:14px">'+esc(av.titulo)+'</div>';
    if(U.admin)h+='<button data-delaviso="'+(D.avisos.length-1-i)+'" style="background:var(--red);color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px">✕</button>';
    h+='</div><div style="font-size:12px;margin-bottom:2px">'+esc(av.texto)+'</div><div style="font-size:10px;opacity:.7">'+av.data+'</div></div>';
  });
  if(U.admin)h+='<button class="bt bt-sm" id="btn-add-aviso" style="background:var(--orange);margin-top:6px">➕ Novo Aviso</button>';
  h+='</div>';
  h+='<div class="cd"><div style="font-size:15px;font-weight:700;margin-bottom:8px">📅 Calendário</div>';
  if(D.calendario.length===0)h+='<div style="color:var(--gray);font-size:13px;text-align:center;padding:20px">Nenhum evento</div>';
  else D.calendario.forEach(function(c,i){
    h+='<div class="cal-item"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-weight:700;font-size:13px">'+esc(c.titulo)+'</div><div style="font-size:11px;color:#666;margin-top:2px">📆 '+c.data+(c.desc?' • '+esc(c.desc):'')+'</div></div>';
    if(U.admin)h+='<button data-delcal="'+i+'" style="background:var(--red);color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px">✕</button>';
    h+='</div></div>';
  });
  if(U.admin)h+='<button class="bt bt-sm" id="btn-add-cal" style="background:var(--blue);margin-top:6px">➕ Novo Evento</button>';
  h+='</div>';
  h+='<div class="cd"><div style="font-size:15px;font-weight:700;margin-bottom:8px">🎁 Sorteio de Doações</div>';
  var ma=mesAno(),s=D.sorteios[ma];
  if(!s)h+='<div style="color:var(--gray);font-size:13px;text-align:center;padding:20px">Nenhum sorteio este mês</div>';
  else{
    h+='<div style="font-size:12px;font-weight:700;color:var(--dk);margin-bottom:6px">🗓️ '+ma+'</div>';
    s.forEach(function(x){h+='<div style="padding:6px 10px;background:#f9f9f9;border-radius:8px;margin-bottom:4px;font-size:12px">'+gb(x.grupo)+' <b>'+esc(x.apelido||x.nome)+'</b> → '+esc(x.item)+'</div>'});
    if(U.admin)h+='<button class="bt bt-sm" id="btn-wpp-doacao" style="background:var(--wpp);margin-top:6px">📋 Copiar p/ WhatsApp</button>';
  }
  if(U.admin){
    h+='<div style="margin-top:10px;padding-top:10px;border-top:1px solid #eee"><div style="font-size:12px;font-weight:700;margin-bottom:6px">Itens para sorteio:</div>';
    if(D.itensDoacao.length===0)h+='<div style="color:var(--gray);font-size:12px;text-align:center;padding:10px">Nenhum item</div>';
    else h+='<div class="fx fw gp4">'+D.itensDoacao.map(function(it,i){return'<span class="mc2">'+esc(it)+' <button data-delitem="'+i+'" style="background:none;color:var(--red);font-size:10px;padding:0 0 0 4px">✕</button></span>'}).join("")+'</div>';
    h+='<div class="g2" style="margin-top:8px"><button class="bt bt-sm" id="btn-add-item" style="background:var(--dk3)">➕ Adicionar Item</button><button class="bt bt-sm" id="btn-sortear" style="background:var(--purple)">🎲 Sortear</button></div></div>';
  }
  h+='</div>';
  h+='</div>';
  document.getElementById("p-home").innerHTML=h;
  loadLogo("logo-h");
}

function rM(){
  var h='<div class="hdr"><div class="hdr-row"><img id="logo-m" alt="Logo"><div class="fc" style="flex:1"><div class="hdr-nm">GERENCIAR</div><div class="hdr-t">Membros</div></div></div></div><div class="ct">';
  if(U.admin){
    h+='<div class="cd g2"><button class="bt" id="btn-add-m" style="background:var(--dk3)">➕ Novo Membro</button><button class="bt" id="btn-lote-m" style="background:var(--dk2)">📄 Lote</button></div>';
  }
  var a=atv();
  if(a.length===0)h+='<div class="cd"><div style="color:var(--gray);text-align:center;padding:30px">Nenhum membro cadastrado</div></div>';
  else{
    GR.forEach(function(g){
      var mem=a.filter(function(m){return m.grupo===g});
      if(mem.length>0){
        h+='<div class="cd"><div class="fh" style="background:'+GC[g]+'">Grupo '+g+' ('+mem.length+')</div>';
        mem.forEach(function(m){
          h+='<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f5f5f5">'+gb(m.grupo)+'<div style="flex:1"><div style="font-size:14px;font-weight:700">'+esc(m.nome)+'</div>';
          if(m.apelido)h+='<div style="font-size:11px;color:#888">@'+esc(m.apelido)+'</div>';
          h+='</div>';
          if(U.admin)h+='<button data-ed-m="'+m.id+'" class="sb">✏️</button>';
          h+='</div>';
        });
        h+='</div>';
      }
    });
  }
  if(U.admin){
    var in_count=D.membros.filter(function(m){return!m.ativo}).length;
    if(in_count>0){
      h+='<div class="cd"><button class="bt" id="btn-inativos" style="background:var(--gray)">👁️ Ver Inativos ('+in_count+')</button></div>';
    }
  }
  h+='</div>';
  document.getElementById("p-membros").innerHTML=h;
  loadLogo("logo-m");
}

function rT(){
  var h='<div class="hdr"><div class="hdr-row"><img id="logo-t" alt="Logo"><div class="fc" style="flex:1"><div class="hdr-nm">GERENCIAR</div><div class="hdr-t">Tarefas</div></div></div></div><div class="ct">';
  if(U.admin){
    h+='<div class="cd"><button class="bt" id="btn-add-t" style="background:var(--dk3)">➕ Nova Tarefa</button></div>';
  }
  if(D.tarefas.length===0)h+='<div class="cd"><div style="color:var(--gray);text-align:center;padding:30px">Nenhuma tarefa</div></div>';
  else{
    FASES.forEach(function(f){
      var ts=D.tarefas.filter(function(t){return t.fase===f});
      if(ts.length>0){
        var fc=f==="Antes"?"var(--blue)":f==="Durante"?"var(--orange)":"var(--green)";
        h+='<div class="cd"><div class="fh" style="background:'+fc+'">'+f+' ('+ts.length+')</div>';
        ts.forEach(function(t,idx){
          var gidx=D.tarefas.indexOf(t);
          h+='<div style="padding:8px 0;border-bottom:1px solid #f5f5f5"><div style="display:flex;justify-content:space-between;align-items:start"><div style="flex:1"><div style="font-size:14px;font-weight:700">'+esc(t.nome)+'</div><div style="font-size:11px;color:#888;margin-top:2px">👥 '+t.qtd+' pessoa'+(t.qtd>1?'s':'');
          if(t.fixos&&t.fixos.length>0)h+=' • '+t.fixos.length+' fixa'+(t.fixos.length>1?'s':'');
          h+='</div></div>';
          if(U.admin)h+='<div class="fx gp4"><button data-ed-t="'+gidx+'" class="sb">✏️</button><button data-del-t="'+gidx+'" class="sb" style="background:#ffe8e8;color:var(--red)">🗑️</button></div>';
          h+='</div>';
          if(t.fixos&&t.fixos.length>0){
            h+='<div class="fx fw gp4" style="margin-top:6px">';
            t.fixos.forEach(function(fid){
              var fm=D.membros.find(function(m){return m.id===fid});
              if(fm)h+='<span class="fix-badge">'+gb(fm.grupo)+' '+esc(fm.nome)+'</span>';
            });
            h+='</div>';
          }
          h+='</div>';
        });
        h+='</div>';
      }
    });
  }
  h+='</div>';
  document.getElementById("p-tarefas").innerHTML=h;
  loadLogo("logo-t");
}

function rE(){
  var h='<div class="hdr"><div class="hdr-row"><img id="logo-e" alt="Logo"><div class="fc" style="flex:1"><div class="hdr-nm">GERENCIAR</div><div class="hdr-t">Escalas</div></div></div></div><div class="ct">';
  
  if(U.admin){
    h+='<div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:8px;color:#666">Tipos de Evento</div>';
    h+='<div class="fx fw gp6">';
    D.tiposEvento.forEach(function(t){
      h+='<button data-tipo-ev="'+t.id+'" style="padding:10px 16px;border-radius:12px;background:'+t.cor+';color:#fff;font-weight:700;font-size:13px;border:2px solid '+(eS.tipo===t.id?'#fff':t.cor)+';box-shadow:'+(eS.tipo===t.id?'0 0 0 2px '+t.cor:'')+';transition:.2s">'+esc(t.nome)+'</button>';
    });
    h+='</div>';
    h+='<button class="bt bt-sm" id="btn-ger-tipos" style="background:var(--dk);margin-top:8px">⚙️ Gerenciar Tipos</button>';
    h+='</div>';
  }
  
  if(eS.tipo===null){
    h+='<div class="cd"><div style="color:var(--gray);text-align:center;padding:40px;font-size:13px">Selecione um tipo de evento acima</div></div>';
  }else{
    var tNome=getTipoNome(eS.tipo);
    var evs=D.eventos[eS.tipo]||[];
    
    if(U.admin){
      h+='<div class="cd"><button class="bt" id="btn-add-ev" style="background:'+getTipoCor(eS.tipo)+'">➕ Nova '+tNome+'</button></div>';
    }
    
    if(evs.length===0){
      h+='<div class="cd"><div style="color:var(--gray);text-align:center;padding:30px">Nenhuma '+tNome.toLowerCase()+' cadastrada</div></div>';
    }else{
      evs.slice().reverse().forEach(function(ev,i){
        var ridx=evs.length-1-i;

function gerarEsc(){
  var dt=document.getElementById("f-data").value;if(!dt)return alert("Data!");
  if(eS.sel.length===0)return alert("Selecione tarefas!");
  var pool=shuf(atv()),pi=0,esc=[];
  eS.sel.forEach(function(ti){
    var t=D.tarefas[ti],need=t.qtd,ms=[],fix=t.fixos||[];
    fix.forEach(function(fid){var m=D.membros.find(function(x){return x.id===fid});if(m&&m.ativo)ms.push({id:m.id,nome:m.nome,grupo:m.grupo,apelido:m.apelido})});
    while(ms.length<need&&pi<pool.length){var cand=pool[pi++];if(!fix.includes(cand.id))ms.push({id:cand.id,nome:cand.nome,grupo:cand.grupo,apelido:cand.apelido})}
    esc.push({tarefa:t.nome,fase:t.fase,membros:ms});
  });
  if(!D.eventos[eS.tipo])D.eventos[eS.tipo]=[];
  D.eventos[eS.tipo].push({data:dt,escalas:esc});
  sv();closeM();eS.sel=[];renderAll();
}

  }
});

function mFormH(eid){
  var m=eid?D.membros.find(function(x){return x.id===eid}):null;
  var nm=m?esc(m.nome):"",ap=m?esc(m.apelido||""):"",gr=m?m.grupo:"A";
  var h='<div class="ig"><label>Nome</label><input id="f-nm" value="'+nm+'"></div>';
  h+='<div class="ig"><label>Apelido</label><input id="f-ap" value="'+ap+'"></div>';
  h+='<div class="ig"><label>Grupo</label><div class="fx gp6">';
  GR.forEach(function(g){h+='<button data-grp="'+g+'" style="flex:1;padding:10px;border-radius:10px;background:'+(gr===g?GC[g]:"var(--lg)")+';color:'+(gr===g?"#fff":"#666")+';font-weight:800;font-size:16px">'+g+'</button>'});
  h+='</div></div><input type="hidden" id="f-gr" value="'+gr+'"><input type="hidden" id="f-eid" value="'+(eid||"")+'">';
  h+='<button class="bt" id="btn-save-m" style="background:var(--dk3)">✅ '+(m?"Salvar":"Cadastrar")+'</button>';
  if(m&&U.admin){h+='<button class="bt" onclick="if(confirm(\'Inativar?\')){var m=D.membros.find(function(x){return x.id==='+eid+'});if(m){m.ativo=false;sv();closeM();renderAll()}}" style="background:var(--gray)">🚫 Inativar</button>'}
  return h;
}
function saveM(){
  var nm=document.getElementById("f-nm").value.trim();if(!nm)return alert("Nome!");
  var ap=document.getElementById("f-ap").value.trim()||null,gr=document.getElementById("f-gr").value,eid=document.getElementById("f-eid").value;
  if(eid){var m=D.membros.find(function(x){return x.id===parseInt(eid)});if(m){m.nome=nm;m.apelido=ap;m.grupo=gr}}
  else D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});
  sv();closeM();renderAll();
}
function doLote(){
  var txt=document.getElementById("f-lote").value.trim();if(!txt)return;var ok=0;
  txt.split("\n").forEach(function(l){var p=l.split(",").map(function(x){return x.trim()});if(p.length>=2){var nm=p[0],ap=p[1]||null,gr=(p[2]||"A").toUpperCase();if(GR.indexOf(gr)>=0&&nm){D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});ok++}}});
  sv();closeM();renderAll();alert("✅ "+ok+" importados!");
}
function tFormOpen(idx){
  var t=idx!==undefined?D.tarefas[idx]:null;
  var nome=t?esc(t.nome):"",qtd=t?t.qtd:1,fase=t?t.fase:FASES[0],fixos=t?t.fixos:[];
  var h='<div class="ig"><label>Fase</label><select id="f-fase">';
  FASES.forEach(function(f){h+='<option value="'+f+'"'+(fase===f?' selected':'')+'>'+f+'</option>'});
  h+='</select></div>';
  h+='<div class="ig"><label>Tarefa</label><input id="f-tnome" value="'+nome+'"></div>';
  h+='<div class="ig"><label>Qtd pessoas</label><input id="f-tqtd" type="number" min="1" value="'+qtd+'"></div>';
  h+='<div class="ig"><label>Pessoas fixas</label><div style="max-height:150px;overflow:auto;border:1px solid #e8e8e8;border-radius:10px;padding:6px">';
  atv().forEach(function(m){
    var ck=fixos.indexOf(m.id)>=0;
    h+='<div class="chk-row"><input type="checkbox" data-fixo-id="'+m.id+'"'+(ck?' checked':'')+'>';
    h+=gb(m.grupo)+' <span style="font-size:13px">'+esc(m.nome)+'</span></div>';
  });
  h+='</div></div><input type="hidden" id="f-tidx" value="'+(idx!==undefined?idx:"")+'">';
  h+='<button class="bt" id="btn-save-tarefa" style="background:var(--dk3)">✅ '+(t?"Salvar":"Cadastrar")+'</button>';
  openM(t?"Editar Tarefa":"Nova Tarefa",h);
}
function saveT(){
  var fase=document.getElementById("f-fase").value,nome=document.getElementById("f-tnome").value.trim();
  var qtd=parseInt(document.getElementById("f-tqtd").value)||1,idx=document.getElementById("f-tidx").value;
  if(!nome)return alert("Nome!");
  var fixos=[];document.querySelectorAll("[data-fixo-id]").forEach(function(cb){if(cb.checked)fixos.push(parseInt(cb.getAttribute("data-fixo-id")))});
  if(idx!==""){var t=D.tarefas[parseInt(idx)];t.fase=fase;t.nome=nome;t.qtd=qtd;t.fixos=fixos}
  else D.tarefas.push({fase:fase,nome:nome,qtd:qtd,fixos:fixos});
  sv();closeM();renderAll();
}
function trocaOpen(ei,mi){
  var a=atv(),ev=D.eventos[eS.tipo][pGid],at=ev.escalas[ei].membros[mi];
  var h='<p style="font-size:12px;color:#666;margin:0 0 10px">Substituindo: <b>'+esc(at.nome)+'</b></p>';
  h+='<div style="max-height:250px;overflow:auto;display:flex;flex-direction:column;gap:4px">';
  a.forEach(function(m){
    h+='<button data-pick="'+m.id+'" data-ei="'+ei+'" data-mi="'+mi+'" style="padding:8px 12px;border-radius:10px;border:1px solid #eee;background:'+(m.id===at.id?"#e8f5e9":"#fff")+';display:flex;align-items:center;gap:6px;text-align:left;width:100%">';
    h+=gb(m.grupo)+'<span style="font-size:13px">'+esc(m.nome)+'</span></button>';
  });
  h+='</div>';openM("Trocar",h);
}
ld();
</script>
