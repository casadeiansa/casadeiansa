<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Casa de Iansã</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--dk:#1a1a2e;--dk2:#16213e;--dk3:#0f3460;--gold:#f0c040;--gold2:#e6a817;--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--orange:#f39c12;--purple:#9b59b6;--wpp:#25d366;--gray:#888;--lg:#f0f0f0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none}input,textarea,select{font-family:inherit}
.hdr{background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));color:#fff;padding:18px 16px 14px;border-radius:0 0 24px 24px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hdr-row img{width:40px;height:40px;border-radius:50%;background:#fff;padding:2px;object-fit:contain}
.hdr-nm{font-size:11px;letter-spacing:1px;opacity:.85;font-family:Georgia,serif;line-height:1.2}
.hdr-t{font-size:22px;font-weight:800;font-family:Georgia,serif;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-i{margin-top:3px;opacity:.7;font-size:12px}
.tbar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--dk),var(--dk2));display:flex;justify-content:space-around;padding:4px 0 max(6px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.1);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.tb{background:none;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:1px;font-size:9px;padding:3px 6px;transition:.2s}
.tb.on{color:var(--gold);font-weight:700;transform:scale(1.05)}
.tb .ic{font-size:18px}
.cd{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:10px}
.bt{width:100%;padding:12px 16px;border-radius:12px;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;margin-bottom:8px}
.bt:disabled{background:#ccc!important}
.bt .bi{font-size:18px}
.bt-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-flex;margin:0}
.gb{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.gA{background:var(--red)}.gB{background:var(--blue)}.gC{background:var(--green)}.gD{background:var(--orange)}
.ig{margin-bottom:12px}
.ig label{font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:3px}
.ig input,.ig textarea,.ig select{width:100%;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:15px;outline:none;transition:.2s}
.ig input:focus,.ig textarea:focus,.ig select:focus{border-color:var(--dk3)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.vis{display:flex}
.mc{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow:auto;padding:16px 14px max(14px,env(safe-area-inset-bottom));animation:su .3s ease}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mh h2{font-size:18px;font-weight:800;color:var(--dk)}
.mx{background:var(--lg);border-radius:50%;width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center}
.ch{padding:6px 14px;border-radius:18px;background:var(--lg);color:#666;font-weight:700;font-size:12px;white-space:nowrap}
.ch.on{background:var(--dk);color:#fff}
.fh{padding:8px 12px;border-radius:10px;color:#fff;font-weight:800;font-size:13px;margin-top:4px;margin-bottom:6px}
.sb{width:34px;height:34px;border-radius:8px;font-size:15px;background:var(--lg);transition:.15s}
.pg{height:4px;border-radius:2px;background:var(--lg);overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:2px;transition:width .5s}
.page{display:none}.page.on{display:block}
.ct{padding:14px;display:flex;flex-direction:column;gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.fx{display:flex}.fc{flex-direction:column}.ac{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.gp4{gap:4px}.gp6{gap:6px}.gp8{gap:8px}.gp10{gap:10px}
.ng{background:linear-gradient(135deg,#fff9e6,#fff3cc);border:1px solid var(--gold);border-radius:14px;padding:14px}
.ng .nt{font-size:13px;font-weight:700;color:#8a6d00}
.ng .nd{font-size:12px;color:#8a6d00;margin-top:3px}
.wp{background:var(--lg);padding:10px;border-radius:10px;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:250px;overflow:auto;line-height:1.4;font-family:monospace}
.mc2{padding:5px 10px;border-radius:18px;border:1px solid #ddd;background:#f8f8f8;font-size:12px;display:inline-flex;align-items:center;gap:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-green{background:#e8f5e9;color:#2e7d32}
.badge-red{background:#fce4ec;color:#c62828}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-blue{background:#e3f2fd;color:#1565c0}
.aviso-card{background:linear-gradient(135deg,#fff9e6,#fffde8);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:8px}
.cal-item{padding:10px 12px;border-left:4px solid var(--blue);border-radius:0 10px 10px 0;background:#f8faff;margin-bottom:6px}
.login-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));padding:20px}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-bg">
  <img id="login-logo" style="width:80px;height:80px;border-radius:50%;background:#fff;padding:4px;object-fit:contain;margin-bottom:16px" alt="Logo">
  <div style="color:#fff;font-family:Georgia,serif;font-size:20px;font-weight:800;text-align:center;margin-bottom:4px">Centro Afro-Religioso</div>
  <div style="color:var(--gold);font-family:Georgia,serif;font-size:24px;font-weight:800;text-align:center;margin-bottom:24px">Casa de Iansã</div>
  <button id="btn-entrar-filho" class="bt" style="background:var(--green);max-width:280px"><span class="bi">👤</span> Entrar como Filho</button>
  <button id="btn-entrar-admin" class="bt" style="background:var(--dk3);max-width:280px"><span class="bi">🔐</span> Entrar como Admin</button>
  <div id="login-senha" style="display:none;margin-top:12px;width:100%;max-width:280px">
    <div class="ig"><input id="input-senha" type="password" placeholder="Digite a senha" style="text-align:center;background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)"></div>
    <button id="btn-login" class="bt" style="background:var(--gold);color:var(--dk)"><span class="bi">🔓</span> Entrar</button>
    <div id="login-erro" style="color:var(--red);text-align:center;font-size:12px;margin-top:6px;display:none">Senha incorreta!</div>
  </div>
</div>

<!-- APP CONTAINER -->
<div id="app" style="display:none">

<!-- PAGES -->
<div id="p-home" class="page on"></div>
<div id="p-membros" class="page"></div>
<div id="p-escala" class="page"></div>
<div id="p-presenca" class="page"></div>
<div id="p-relatorio" class="page"></div>
<div id="p-mensalidade" class="page"></div>
<div id="p-doacoes" class="page"></div>
<div id="p-calendario" class="page"></div>
<div id="p-avisos" class="page"></div>

<!-- TABBAR -->
<div class="tbar" id="tbar"></div>

<!-- MODAL -->
<div id="modal" class="mo"><div class="mc"><div class="mh"><h2 id="m-title"></h2><button class="mx" id="m-close">✕</button></div><div id="m-body"></div></div></div>
</div>

// === TABBAR ===
function buildTabbar(){
  var tabs=isAdmin()?[

    {id:"avisos",ic:"📢",l:"Avisos"},{id:"doacoes",ic:"🎁",l:"Doações"}
  ];
  var h="";tabs.forEach(function(t){h+='<button class="tb'+(t.id==="home"?" on":"")+'" data-tab="'+t.id+'"><span class="ic">'+t.ic+'</span><span>'+t.l+"</span></button>"});

}

// === NAV ===
function go(tab){
  cTab=tab;if(tab==="escala")eS={etapa:"inicio"};if(tab==="presenca")pGid=null;
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("on")});
  var el=document.getElementById("p-"+tab);if(el)el.classList.add("on");
  document.querySelectorAll(".tb").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-tab")===tab)});

  var h=hdr("Mural de Avisos","Recados importantes da casa");h+='<div class="ct">';
  if(isAdmin()){h+='<button class="bt" id="btn-add-aviso" style="background:var(--orange)"><span class="bi">📢</span> Novo Aviso</button>'}
  if(!D.avisos.length)h+='<div style="text-align:center;padding:30px;color:#aaa">Nenhum aviso publicado.</div>';
  D.avisos.slice().reverse().forEach(function(av,i){
    var ri=D.avisos.length-1-i;
    h+='<div class="aviso-card"><div class="fx jb"><div style="font-size:10px;color:var(--gray)">'+e(av.data)+'</div>';
    if(isAdmin())h+='<button style="background:none;font-size:12px;color:var(--red)" data-delaviso="'+ri+'">🗑️</button>';
    h+='</div><div style="font-size:14px;font-weight:700;margin-top:4px">'+e(av.titulo)+'</div><div style="font-size:13px;color:#444;margin-top:4px;white-space:pre-wrap">'+e(av.texto)+'</div></div>'});
  h+="</div>";el.innerHTML=h;setLogos();
}

// === RENDER ALL ===
function renderAll(){rHome();if(isAdmin()){rMembros();rPresenca();rRelatorio();rMensalidade()}rEscala();rDoacoes();rCalendario();rAvisos()}

// === MODALS ===
function addMForm(eid){var m=eid?D.membros.find(function(x){return x.id===eid}):null;var nm=m?e(m.nome):"",ap=m?e(m.apelido||""):"",gr=m?m.grupo:"A";var h='<div class="ig"><label>Nome completo</label><input id="f-nm" value="'+nm+'"></div><div class="ig"><label>Apelido/WhatsApp</label><input id="f-ap" value="'+ap+'"></div><div class="ig"><label>Grupo</label><div class="fx gp6">';GR.forEach(function(g){h+='<button data-grp="'+g+'" style="flex:1;padding:10px;border-radius:10px;background:'+(gr===g?GC[g]:"var(--lg)")+";color:"+(gr===g?"#fff":"#666")+';font-weight:800;font-size:16px">'+g+"</button>"});h+='</div></div><input type="hidden" id="f-gr" value="'+gr+'"><input type="hidden" id="f-eid" value="'+(eid||"")+'">';h+='<button class="bt" id="btn-save-m" style="background:var(--dk3)"><span class="bi">✅</span>'+(m?"Salvar":"Cadastrar")+"</button>";openM(m?"Editar":"Novo Membro",h)}
function loteForm(){openM("Importar Lista",'<p style="font-size:12px;color:#666;margin:0 0 10px">Um por linha: <b>Nome, Apelido, Grupo</b></p><div class="ig"><textarea id="f-lote" rows="6" style="font-family:monospace;font-size:13px" placeholder="Fernando, ~Fernando, A"></textarea></div><button class="bt" id="btn-do-lote" style="background:var(--blue)"><span class="bi">📥</span>Importar</button>')}
function addItemForm(){openM("Novo Item de Doação",'<div class="ig"><label>Nome do item</label><input id="f-item" placeholder="Ex: Pacote de velas"></div><button class="bt" id="btn-save-item" style="background:var(--green)"><span class="bi">✅</span>Adicionar</button>')}
function addCalForm(){openM("Novo Evento",'<div class="ig"><label>Título</label><input id="f-cal-tit" placeholder="Ex: Festa de Iansã"></div><div class="ig"><label>Data</label><input id="f-cal-data" placeholder="Ex: 15/06/2026"></div><div class="ig"><label>Descrição</label><input id="f-cal-desc" placeholder="Ex: Chegada às 10h"></div><button class="bt" id="btn-save-cal" style="background:var(--blue)"><span class="bi">✅</span>Adicionar</button>')}
function addAvisoForm(){openM("Novo Aviso",'<div class="ig"><label>Título</label><input id="f-av-tit" placeholder="Ex: Aviso importante"></div><div class="ig"><label>Mensagem</label><textarea id="f-av-txt" rows="4" placeholder="Digite o recado..."></textarea></div><button class="bt" id="btn-save-aviso" style="background:var(--orange)"><span class="bi">📢</span>Publicar</button>')}
function showWpp(gid){var gi=D.giras.find(function(g){return g.id===gid});if(!gi)return;openM("📱 WhatsApp",'<pre class="wp">'+e(wppMsg(gi))+'</pre><button class="bt" id="btn-copy" data-gid="'+gid+'" style="background:var(--wpp);margin-top:10px"><span class="bi">📋</span>Copiar</button>')}
function trocaForm(ei,mi){var a=atv(),at=eS.esc[ei].membros[mi];var h='<p style="font-size:12px;color:#666;margin:0 0 10px">Substituindo: <b>'+e(at.nome)+'</b></p><div style="max-height:250px;overflow:auto;display:flex;flex-direction:column;gap:4px">';a.forEach(function(m){h+='<button data-pick="'+m.id+'" data-ei="'+ei+'" data-mi="'+mi+'" style="padding:8px 12px;border-radius:10px;border:1px solid #eee;background:'+(m.id===at.id?"#e8f5e9":"#fff")+';display:flex;align-items:center;gap:6px;text-align:left;width:100%">'+gb(m.grupo)+'<span style="font-size:13px">'+e(m.nome)+"</span></button>"});h+="</div>";openM("Trocar",h)}

// === EVENT DELEGATION ===
document.addEventListener("click",function(ev){
  var t=ev.target,btn=t.closest("button"),div=t.closest("div");
  if(btn&&btn.classList.contains("tb")){var tab=btn.getAttribute("data-tab");if(tab)go(tab);return}
  if(btn&&btn.getAttribute("data-go")){go(btn.getAttribute("data-go"));return}
  if(btn&&btn.id==="btn-export"){exportD();return}
  if(btn&&btn.id==="m-close"){closeM();return}
  if(t.id==="modal"||t.classList.contains("mo")){closeM();return}
  if(btn&&btn.id==="btn-logout"){mode="";document.getElementById("app").style.display="none";document.getElementById("login-screen").style.display="flex";document.getElementById("login-senha").style.display="none";document.getElementById("input-senha").value="";return}
  if(btn&&btn.id==="btn-add"){addMForm();return}
  if(btn&&btn.id==="btn-lote"){loteForm();return}
  if(btn&&btn.classList.contains("ch")&&btn.getAttribute("data-filt")){fM=btn.getAttribute("data-filt");rMembros();return}
  if(btn&&btn.getAttribute("data-edit")){addMForm(parseInt(btn.getAttribute("data-edit")));return}
  if(btn&&btn.getAttribute("data-del")){if(confirm("Desativar?")){var m=D.membros.find(function(x){return x.id===parseInt(btn.getAttribute("data-del"))});if(m){m.ativo=false;sv();renderAll()}}return}
  if(btn&&btn.getAttribute("data-grp")){var g=btn.getAttribute("data-grp");document.getElementById("f-gr").value=g;btn.parentElement.querySelectorAll("button").forEach(function(b){var bg=b.getAttribute("data-grp");b.style.background=bg===g?GC[bg]:"var(--lg)";b.style.color=bg===g?"#fff":"#666"});return}
  if(btn&&btn.id==="btn-save-m"){var nm=document.getElementById("f-nm").value.trim();if(!nm)return alert("Nome!");var ap=document.getElementById("f-ap").value.trim()||null,gr=document.getElementById("f-gr").value,eid=document.getElementById("f-eid").value;if(eid){var m=D.membros.find(function(x){return x.id===parseInt(eid)});if(m){m.nome=nm;m.apelido=ap;m.grupo=gr}}else D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});sv();closeM();renderAll();return}
  if(btn&&btn.id==="btn-do-lote"){var txt=document.getElementById("f-lote").value.trim();if(!txt)return;var ok=0;txt.split("\n").forEach(function(l){var p=l.split(",").map(function(x){return x.trim()});if(p.length>=2){var nm=p[0],ap=p[1]||null,gr=(p[2]||"A").toUpperCase();if(GR.indexOf(gr)>=0&&nm){D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});ok++}}});sv();closeM();renderAll();alert("✅ "+ok+" importados!");return}
  if(btn&&btn.id==="btn-gerar"){var dt=document.getElementById("e-data").value.trim();if(!dt)return alert("Data!");eS={etapa:"preview",gira:{id:D.nGid,data:dt,status:"rascunho",escala:gerarEsc(dt),presenca:{}},esc:gerarEsc(dt)};eS.gira.escala=eS.esc;rEscala();return}
  if(btn&&btn.id==="btn-regen"){eS.esc=gerarEsc(eS.gira.data);eS.gira.escala=eS.esc;rEscala();return}
  if(btn&&btn.id==="btn-canc"){eS={etapa:"inicio"};rEscala();return}
  if(btn&&btn.id==="btn-pub"){var gi=JSON.parse(JSON.stringify(eS.gira));gi.status="publicada";D.giras.push(gi);D.nGid++;D.rot=(D.rot+1)%4;sv();eS={etapa:"inicio"};renderAll();alert("✅ Publicada!");return}
  if(btn&&btn.getAttribute("data-troca")){var p=btn.getAttribute("data-troca").split("-");trocaForm(parseInt(p[0]),parseInt(p[1]));return}
  if(btn&&btn.getAttribute("data-pick")){var mid=parseInt(btn.getAttribute("data-pick")),ei=parseInt(btn.getAttribute("data-ei")),mi=parseInt(btn.getAttribute("data-mi")),m=D.membros.find(function(x){return x.id===mid});if(m){eS.esc[ei].membros[mi]=JSON.parse(JSON.stringify(m));eS.gira.escala=eS.esc}closeM();rEscala();return}
  if(btn&&btn.getAttribute("data-wpp")){showWpp(parseInt(btn.getAttribute("data-wpp")));return}
  if(btn&&btn.id==="btn-copy"){var gid=parseInt(btn.getAttribute("data-gid")),gi=D.giras.find(function(g){return g.id===gid});if(gi)navigator.clipboard.writeText(wppMsg(gi)).then(function(){btn.innerHTML='<span class="bi">✅</span>Copiado!';setTimeout(function(){btn.innerHTML='<span class="bi">📋</span>Copiar'},2000)});return}
  if(btn&&btn.getAttribute("data-gopres")){pGid=parseInt(btn.getAttribute("data-gopres"));go("presenca");return}
  if(div&&div.getAttribute("data-pgira")){pGid=parseInt(div.getAttribute("data-pgira"));rPresenca();return}
  if(btn&&btn.id==="btn-pvolt"){pGid=null;rPresenca();return}
  if(btn&&btn.getAttribute("data-pmark")){var p=btn.getAttribute("data-pmark").split("-"),mid=parseInt(p[0]),st=p[1],gi=D.giras.find(function(g){return g.id===pGid});if(gi){if(!gi.presenca)gi.presenca={};gi.presenca[mid]=st;sv();rPresenca()}return}
  if(btn&&btn.getAttribute("data-mens")){var p=btn.getAttribute("data-mens").split("-"),mid=parseInt(p[0]),st=p[1],ma=mesAno(),k=ma+"_"+mid;D.mensalidades[k]=st;sv();rMensalidade();return}
  if(btn&&btn.id==="btn-add-item"){addItemForm();return}
  if(btn&&btn.id==="btn-save-item"){var it=document.getElementById("f-item").value.trim();if(!it)return;D.itensDoacao.push(it);sv();closeM();renderAll();return}
  if(btn&&btn.getAttribute("data-delitem")!==null&&btn.getAttribute("data-delitem")!==undefined){var i=parseInt(btn.getAttribute("data-delitem"));D.itensDoacao.splice(i,1);sv();renderAll();return}
  if(btn&&btn.id==="btn-sortear"){if(confirm("Sortear doações deste mês? Isso vai redistribuir os itens.")){sortearDoacoes()}return}
  if(btn&&btn.id==="btn-wpp-doacao"){wppDoacao();return}
  if(btn&&btn.id==="btn-add-cal"){addCalForm();return}
  if(btn&&btn.id==="btn-save-cal"){var tit=document.getElementById("f-cal-tit").value.trim(),dt=document.getElementById("f-cal-data").value.trim(),desc=document.getElementById("f-cal-desc").value.trim();if(!tit||!dt)return alert("Preencha título e data!");D.calendario.push({titulo:tit,data:dt,desc:desc});sv();closeM();renderAll();return}
  if(btn&&btn.getAttribute("data-delcal")!==null&&btn.getAttribute("data-delcal")!==undefined){D.calendario.splice(parseInt(btn.getAttribute("data-delcal")),1);sv();renderAll();return}
  if(btn&&btn.id==="btn-add-aviso"){addAvisoForm();return}
  if(btn&&btn.id==="btn-save-aviso"){var tit=document.getElementById("f-av-tit").value.trim(),txt=document.getElementById("f-av-txt").value.trim();if(!tit||!txt)return alert("Preencha tudo!");D.avisos.push({titulo:tit,texto:txt,data:new Date().toLocaleDateString("pt-BR")});sv();closeM();renderAll();return}
  if(btn&&btn.getAttribute("data-delaviso")!==null&&btn.getAttribute("data-delaviso")!==undefined){D.avisos.splice(parseInt(btn.getAttribute("data-delaviso")),1);sv();renderAll();return}
});
document.addEventListener("change",function(ev){if(ev.target.id==="file-import"){importD(ev.target.files[0]);ev.target.value=""}});
</script>
