<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Casa de Iansã</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--dk:#1a1a2e;--dk2:#16213e;--dk3:#0f3460;--gold:#f0c040;--gold2:#e6a817;--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--orange:#f39c12;--purple:#9b59b6;--wpp:#25d366;--gray:#888;--lg:#f0f0f0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea,select{font-family:inherit}
.hdr{background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));color:#fff;padding:18px 16px 14px;border-radius:0 0 24px 24px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hdr-row img{width:40px;height:40px;border-radius:50%;background:#fff;padding:2px;object-fit:contain}
.hdr-nm{font-size:11px;letter-spacing:1px;opacity:.85;font-family:Georgia,serif;line-height:1.2}
.hdr-t{font-size:22px;font-weight:800;font-family:Georgia,serif;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-i{margin-top:3px;opacity:.7;font-size:12px}
.tbar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--dk),var(--dk2));display:flex;justify-content:space-around;padding:4px 0 max(6px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.1);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.tb{background:none;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:1px;font-size:9px;padding:3px 6px;transition:.2s}
.tb.on{color:var(--gold);font-weight:700;transform:scale(1.05)}
.tb .ic{font-size:18px}
.cd{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:10px}
.bt{width:100%;padding:12px 16px;border-radius:12px;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;margin-bottom:8px}
.bt:disabled{background:#ccc!important}
.bt .bi{font-size:18px}
.bt-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-flex;margin:0}
.gb{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.gA{background:var(--red)}.gB{background:var(--blue)}.gC{background:var(--green)}.gD{background:var(--orange)}
.ig{margin-bottom:12px}
.ig label{font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:3px}
.ig input,.ig textarea,.ig select{width:100%;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:15px;outline:none;transition:.2s}
.ig input:focus,.ig textarea:focus,.ig select:focus{border-color:var(--dk3)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.vis{display:flex}
.mc{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow:auto;padding:16px 14px max(14px,env(safe-area-inset-bottom));animation:su .3s ease}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mh h2{font-size:18px;font-weight:800;color:var(--dk)}
.mx{background:var(--lg);border-radius:50%;width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center}
.ch{padding:6px 14px;border-radius:18px;background:var(--lg);color:#666;font-weight:700;font-size:12px;white-space:nowrap}
.ch.on{background:var(--dk);color:#fff}
.fh{padding:8px 12px;border-radius:10px;color:#fff;font-weight:800;font-size:13px;margin-top:4px;margin-bottom:6px}
.sb{width:34px;height:34px;border-radius:8px;font-size:15px;background:var(--lg);transition:.15s}
.pg{height:4px;border-radius:2px;background:var(--lg);overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:2px;transition:width .5s}
.page{display:none}.page.on{display:block}
.ct{padding:14px;display:flex;flex-direction:column;gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.fx{display:flex}.fc{flex-direction:column}.ac{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.gp4{gap:4px}.gp6{gap:6px}.gp8{gap:8px}.gp10{gap:10px}
.ng{background:linear-gradient(135deg,#fff9e6,#fff3cc);border:1px solid var(--gold);border-radius:14px;padding:14px}
.ng .nt{font-size:13px;font-weight:700;color:#8a6d00}
.ng .nd{font-size:12px;color:#8a6d00;margin-top:3px}
.wp{background:var(--lg);padding:10px;border-radius:10px;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:250px;overflow:auto;line-height:1.4;font-family:monospace}
.mc2{padding:5px 10px;border-radius:18px;border:1px solid #ddd;background:#f8f8f8;font-size:12px;display:inline-flex;align-items:center;gap:4px}
.aviso-card{background:linear-gradient(135deg,#fff9e6,#fffde8);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:8px}
.cal-item{padding:10px 12px;border-left:4px solid var(--blue);border-radius:0 10px 10px 0;background:#f8faff;margin-bottom:6px}
.chk-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.chk-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--green)}
.fix-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#e8f5e9;color:#2e7d32}
.login-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));padding:20px}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div id="login-screen" class="login-bg">
<img id="login-logo" style="width:80px;height:80px;border-radius:50%;background:#fff;padding:4px;object-fit:contain;margin-bottom:16px" alt="Logo">
<div style="color:#fff;font-family:Georgia,serif;font-size:20px;font-weight:800;text-align:center;margin-bottom:4px">Centro Afro-Religioso</div>
<div style="color:var(--gold);font-family:Georgia,serif;font-size:24px;font-weight:800;text-align:center;margin-bottom:24px">Casa de Iansã</div>
<button id="btn-ef" class="bt" style="background:var(--green);max-width:280px"><span class="bi">👤</span> Entrar como Filho</button>
<button id="btn-ea" class="bt" style="background:var(--dk3);max-width:280px"><span class="bi">🔐</span> Entrar como Admin</button>
<div id="ls" style="display:none;margin-top:12px;width:100%;max-width:280px">
<div class="ig"><input id="inp-s" type="password" placeholder="Digite a senha" style="text-align:center;background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)"></div>
<button id="btn-lg" class="bt" style="background:var(--gold);color:var(--dk)"><span class="bi">🔓</span> Entrar</button>
<div id="lg-err" style="color:var(--red);text-align:center;font-size:12px;margin-top:6px;display:none">Senha incorreta!</div>
</div>
</div>
<div id="app" style="display:none">
<div id="p-home" class="page on"></div>
<div id="p-membros" class="page"></div>
<div id="p-tarefas" class="page"></div>
<div id="p-escala" class="page"></div>
<div id="p-presenca" class="page"></div>
<div id="p-relatorio" class="page"></div>
<div id="p-mensalidade" class="page"></div>
<div id="p-doacoes" class="page"></div>
<div id="p-calendario" class="page"></div>
<div id="p-avisos" class="page"></div>
<div class="tbar" id="tbar"></div>
<div id="modal" class="mo"><div class="mc"><div class="mh"><h2 id="m-title"></h2><button class="mx" id="m-close">✕</button></div><div id="m-body"></div></div></div>
</div>
<script>
var LOGO="logo.png";
var PASS="iansa2026";
var GR=["A","B","C","D"];
var GC={A:"#e74c3c",B:"#3498db",C:"#2ecc71",D:"#f39c12"};
var SM={presente:{i:"\u2705",l:"Presente",c:"#2ecc71"},faltou:{i:"\u274C",l:"Faltou",c:"#e74c3c"},avisou:{i:"\uD83D\uDD14",l:"Avisou",c:"#f39c12"},trocou:{i:"\uD83D\uDD04",l:"Trocou",c:"#3498db"}};
var FASES=["PR\u00C9-GIRA","DURANTE A GIRA","P\u00D3S-GIRA"];
var FCOR={"PR\u00C9-GIRA":"var(--orange)","DURANTE A GIRA":"var(--blue)","P\u00D3S-GIRA":"var(--green)"};
var TAREFAS_PADRAO=[
{fase:"PR\u00C9-GIRA",nome:"Filho de Trabalho Respons\u00E1vel",qtd:1,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Varrer e passar pano no terreiro + cuspidores",qtd:4,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Varrer cal\u00E7ada e guardar vassouras/rodos/bacias",qtd:1,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Varrer, passar pano e organizar o 2\u00BA andar",qtd:3,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Limpar as cadeiras",qtd:2,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Organizar a cozinha",qtd:2,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Lavar os 3 banheiros e repor utens\u00EDlios",qtd:3,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Lavar panos de ch\u00E3o e estender",qtd:1,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Estoque",qtd:1,fixos:[]},
{fase:"PR\u00C9-GIRA",nome:"Cuidar da casinha de Exu",qtd:1,fixos:[]},
{fase:"DURANTE A GIRA",nome:"Caixa",qtd:1,fixos:[]},
{fase:"DURANTE A GIRA",nome:"Cantina",qtd:2,fixos:[]},
{fase:"DURANTE A GIRA",nome:"Chamar a assist\u00EAncia",qtd:3,fixos:[]},
{fase:"P\u00D3S-GIRA",nome:"Respons\u00E1vel P\u00F3s-Gira",qtd:1,fixos:[]},
{fase:"P\u00D3S-GIRA",nome:"Arrumar a cozinha",qtd:2,fixos:[]},
{fase:"P\u00D3S-GIRA",nome:"Lavar os 2 banheiros",qtd:2,fixos:[]},
{fase:"P\u00D3S-GIRA",nome:"Varrer e passar pano + guardar cuspidores/copos de vela",qtd:4,fixos:[]},
{fase:"P\u00D3S-GIRA",nome:"Tirar lixo, guardar vassouras, lavar panos",qtd:1,fixos:[]},
{fase:"P\u00D3S-GIRA",nome:"Organizar 2\u00BA andar (verificar pertences)",qtd:1,fixos:[]}
];

var SK="terreiro_v4";
var D,mode="",cTab="home",fM="todos",eS={etapa:"inicio",gira:null,esc:null,sel:null},pGid=null;

function dd(){return{membros:[],giras:[],tarefas:JSON.parse(JSON.stringify(TAREFAS_PADRAO)),rot:0,nMid:1,nGid:1,nTid:1,mensalidades:{},itensDoacao:[],sorteios:{},calendario:[],avisos:[]}}

function ld(){
  try{
    var r=localStorage.getItem(SK);
    if(r){
      var d=JSON.parse(r);
      if(!d.tarefas)d.tarefas=JSON.parse(JSON.stringify(TAREFAS_PADRAO));
      if(!d.mensalidades)d.mensalidades={};
      if(!d.itensDoacao)d.itensDoacao=[];
      if(!d.sorteios)d.sorteios={};
      if(!d.calendario)d.calendario=[];
      if(!d.avisos)d.avisos=[];
      d.tarefas.forEach(function(t){if(!t.fixos)t.fixos=[]});
      return d;
    }
  }catch(ex){}
  return dd();
}
function sv(){try{localStorage.setItem(SK,JSON.stringify(D))}catch(ex){}}
D=ld();

function atv(){return D.membros.filter(function(m){return m.ativo})}
function gp(){return D.giras.filter(function(g){return g.status==="publicada"})}
function shuf(a){a=[].concat(a);for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function esc(s){return s?String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):""}
function gb(g){return '<span class="gb g'+g+'">'+g+'</span>'}
function isA(){return mode==="admin"}
function mesAno(){var d=new Date();return(d.getMonth()+1)+"/"+d.getFullYear()}

// LOGIN
document.getElementById("login-logo").src=LOGO;
document.getElementById("btn-ef").addEventListener("click",function(){mode="filho";startApp()});
document.getElementById("btn-ea").addEventListener("click",function(){document.getElementById("ls").style.display="block"});
document.getElementById("btn-lg").addEventListener("click",doLogin);
document.getElementById("inp-s").addEventListener("keydown",function(ev){if(ev.key==="Enter")doLogin()});
function doLogin(){
  if(document.getElementById("inp-s").value===PASS){mode="admin";startApp()}
  else{var el=document.getElementById("lg-err");el.style.display="block";setTimeout(function(){el.style.display="none"},2000)}
}
function startApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  buildTabs();setLogos();go("home");
}

// TABS
function buildTabs(){
  var tabs=isA()?[
    {id:"home",ic:"\uD83C\uDFE0",l:"In\u00EDcio"},{id:"membros",ic:"\uD83D\uDC65",l:"Membros"},
    {id:"tarefas",ic:"\uD83D\uDCCB",l:"Tarefas"},{id:"escala",ic:"\u2699\uFE0F",l:"Escala"},
    {id:"mensalidade",ic:"\uD83D\uDCB0",l:"Mensal."}
  ]:[
    {id:"home",ic:"\uD83C\uDFE0",l:"In\u00EDcio"},{id:"escala",ic:"\uD83D\uDCCB",l:"Escala"},
    {id:"calendario",ic:"\uD83D\uDCC5",l:"Calend\u00E1rio"},{id:"avisos",ic:"\uD83D\uDCE2",l:"Avisos"},
    {id:"doacoes",ic:"\uD83C\uDF81",l:"Doa\u00E7\u00F5es"}
  ];
  var h="";
  tabs.forEach(function(t){
    h+='<button class="tb'+(t.id==="home"?" on":"")+'" data-tab="'+t.id+'">';
    h+='<span class="ic">'+t.ic+'</span><span>'+t.l+'</span></button>';
  });
  document.getElementById("tbar").innerHTML=h;
}

// NAV
function go(tab){
  cTab=tab;
  if(tab==="escala")eS={etapa:"inicio",gira:null,esc:null,sel:null};
  if(tab==="presenca")pGid=null;
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("on")});
  var el=document.getElementById("p-"+tab);
  if(el)el.classList.add("on");
  document.querySelectorAll(".tb").forEach(function(b){
    b.classList.toggle("on",b.getAttribute("data-tab")===tab);
  });
  renderAll();
}

function mkHdr(t,sub){
  var h='<div class="hdr"><div class="hdr-row">';
  h+='<img class="li" alt="Logo">';
  h+='<div class="hdr-nm">Centro Afro-Religioso<br>Casa de Ians\u00E3</div>';
  h+='</div><div class="hdr-t">'+t+'</div>';
  if(sub)h+='<div class="hdr-i">'+sub+'</div>';
  h+='</div>';
  return h;
}
function setLogos(){document.querySelectorAll(".li").forEach(function(i){i.src=LOGO})}
function openM(t,h){document.getElementById("m-title").textContent=t;document.getElementById("m-body").innerHTML=h;document.getElementById("modal").classList.add("vis")}
function closeM(){document.getElementById("modal").classList.remove("vis")}
function exportD(){var b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="terreiro_backup_"+new Date().toISOString().slice(0,10)+".json";a.click()}

// ========== RENDER HOME ==========
function rHome(){
  var a=atv(),p=gp(),el=document.getElementById("p-home");
  var h=mkHdr("Gest\u00E3o da Casa","Ax\u00E9! "+(isA()?"Modo Administrador":"Modo Filho"));
  h+='<div class="ct">';
  h+='<div class="cd"><div class="fx jb ac"><div>';
  h+='<div style="font-size:12px;color:var(--gray);font-weight:600">Membros ativos</div>';
  h+='<div style="font-size:32px;font-weight:800;color:var(--dk)">'+a.length+'</div>';
  h+='</div><div class="fx gp6">';
  GR.forEach(function(g){
    var n=a.filter(function(m){return m.grupo===g}).length;
    h+='<div style="text-align:center">'+gb(g);
    h+='<div style="font-size:10px;font-weight:700;margin-top:1px">'+n+'</div></div>';
  });
  h+='</div></div></div>';
  if(D.avisos.length){
    var av=D.avisos[D.avisos.length-1];
    h+='<div class="aviso-card">';
    h+='<div style="font-size:11px;color:var(--gray)">\uD83D\uDCE2 \u00DAltimo aviso</div>';
    h+='<div style="font-size:13px;font-weight:700;margin-top:2px">'+esc(av.titulo)+'</div>';
    h+='<div style="font-size:12px;color:#555;margin-top:2px">'+esc(av.texto).substring(0,80)+'</div></div>';
  }
  if(isA()){
    h+='<div class="g3">';
    var btns=[["membros","\uD83D\uDC65","Membros","var(--blue)"],["tarefas","\uD83D\uDCCB","Tarefas","var(--purple)"],["escala","\u2699\uFE0F","Escala","var(--green)"],["presenca","\u2705","Presen\u00E7a","var(--orange)"],["relatorio","\uD83D\uDCCA","Relat\u00F3rio","var(--dk3)"],["mensalidade","\uD83D\uDCB0","Mensal.","var(--red)"],["doacoes","\uD83C\uDF81","Doa\u00E7\u00F5es","#8e44ad"],["calendario","\uD83D\uDCC5","Calend.","var(--blue)"],["avisos","\uD83D\uDCE2","Avisos","var(--orange)"]];
    btns.forEach(function(b){
      h+='<button class="bt" data-go="'+b[0]+'" style="background:'+b[3]+';font-size:11px;padding:10px 6px">';
      h+='<span class="bi" style="font-size:15px">'+b[1]+'</span>'+b[2]+'</button>';
    });
    h+='</div>';
    h+='<div class="cd" style="border:1px dashed #ccc;text-align:center">';
    h+='<div style="font-size:12px;color:var(--gray);margin-bottom:6px">Backup</div>';
    h+='<div class="fx gp8" style="justify-content:center">';
    h+='<button class="bt bt-sm" id="btn-export" style="background:var(--dk3)">\uD83D\uDCE5 Exportar</button>';
    h+='<label class="bt bt-sm" style="background:var(--orange);cursor:pointer">\uD83D\uDCE4 Importar';
    h+='<input type="file" id="file-import" accept=".json" style="display:none"></label></div></div>';
  }else{
    h+='<div class="g2">';
    var btns2=[["escala","\uD83D\uDCCB","Ver Escala","var(--green)"],["calendario","\uD83D\uDCC5","Calend\u00E1rio","var(--blue)"],["avisos","\uD83D\uDCE2","Avisos","var(--orange)"],["doacoes","\uD83C\uDF81","Doa\u00E7\u00F5es","var(--red)"]];
    btns2.forEach(function(b){
      h+='<button class="bt" data-go="'+b[0]+'" style="background:'+b[3]+'">';
      h+='<span class="bi">'+b[1]+'</span>'+b[2]+'</button>';
    });
    h+='</div>';
  }
  h+='<div class="ng"><div class="nt">\uD83D\uDCA1 Regra de Ouro</div>';
  h+='<div class="nd">Quem <strong>n\u00E3o responde</strong> no WhatsApp est\u00E1 <strong>CONFIRMADO</strong> na escala!</div></div>';
  h+='<button class="bt" id="btn-logout" style="background:var(--gray);font-size:13px">';
  h+='<span class="bi">\uD83D\uDEAA</span> Sair</button>';
  h+='</div>';
  el.innerHTML=h;setLogos();
}

// ========== MEMBROS ==========
function rMembros(){
  if(!isA())return;
  var a=atv(),el=document.getElementById("p-membros");
  var h=mkHdr("Membros",a.length+" membros ativos");
  h+='<div class="ct">';
  h+='<div class="fx gp8">';
  h+='<button class="bt" id="btn-add" style="background:var(--green);flex:1"><span class="bi">\u2795</span>Adicionar</button>';
  h+='<button class="bt" id="btn-lote" style="background:var(--blue);flex:1"><span class="bi">\uD83D\uDCCB</span>Importar</button></div>';
  h+='<div class="fx gp6" style="overflow-x:auto">';
  h+='<button class="ch'+(fM==="todos"?" on":"")+'" data-filt="todos">Todos ('+a.length+')</button>';

// ========== ESCALA ==========
function gerarEsc(tarefasSelecionadas){
  var a=atv();
  var rot=D.rot;
  var todosFixos={};
  tarefasSelecionadas.forEach(function(t){
    if(t.fixos)t.fixos.forEach(function(fid){todosFixos[fid]=true});
  });
  var sorteiaveis=a.filter(function(m){return!todosFixos[m.id]});
  var mg={};
  GR.forEach(function(g){mg[g]=shuf(sorteiaveis.filter(function(m){return m.grupo===g}))});
  var ic={A:0,B:0,C:0,D:0};
  var resultado=[];
  tarefasSelecionadas.forEach(function(t,ti){
    var membros=[];
    if(t.fixos&&t.fixos.length){
      t.fixos.forEach(function(fid){
        var m=D.membros.find(function(x){return x.id===fid});
        if(m)membros.push(JSON.parse(JSON.stringify(m)));
      });
    }
    var falta=t.qtd-membros.length;
    if(falta>0){
      var gi=(ti+rot)%4;
      var g=GR[gi];
      var pool=mg[g];
      for(var i=0;i<falta;i++){
        if(pool&&pool.length){
          membros.push(JSON.parse(JSON.stringify(pool[ic[g]%pool.length])));
          ic[g]++;
        }
      }
    }
    resultado.push({fase:t.fase,tarefa:t.nome,qtd:t.qtd,membros:membros});
  });
  return resultado;
}

function rRelatorio(){
  var el=document.getElementById("p-relatorio"),p=gp(),a=atv();

  h+='<div class="ct">';
  var st=a.map(function(m){
    var pr=0,fa=0,av=0,tr=0,tot=0;
    p.forEach(function(g){
      if(g.escala.some(function(x){return x.membros.some(function(mm){return mm.id===m.id})})){
        tot++;var s=(g.presenca||{})[m.id];
        if(s==="presente")pr++;else if(s==="faltou")fa++;else if(s==="avisou")av++;else if(s==="trocou")tr++;
      }
    });
    return{id:m.id,nome:m.nome,grupo:m.grupo,pr:pr,fa:fa,av:av,tr:tr,tot:tot,pct:tot>0?Math.round(pr/tot*100):null};
  }).sort(function(a,b){return(a.pct===null?-1:a.pct)-(b.pct===null?-1:b.pct)});
  st.forEach(function(m){
    var c=m.pct>=70?"var(--green)":m.pct>=40?"var(--orange)":"var(--red)";

      h+='<div style="font-size:12px;color:var(--blue)">\u2192 '+esc(s.item)+'</div></div></div>';
    });
    h+='</div>';
    if(isA()){
      h+='<button class="bt" id="btn-wpp-doacao" style="background:var(--wpp)">';
      h+='<span class="bi">\uD83D\uDCF1</span> Copiar pro WhatsApp</button>';
    }
  }
  h+='</div>';
  el.innerHTML=h;setLogos();
}

// ========== RENDER ALL ==========
function renderAll(){
  rHome();

// ========== EVENT DELEGATION ==========
document.addEventListener("click",function(ev){
  var t=ev.target;
  var btn=t.closest?t.closest("button"):null;
  var div=t.closest?t.closest("div"):null;

  if(btn&&btn.classList.contains("tb")){go(btn.getAttribute("data-tab"));return}
  if(btn&&btn.getAttribute("data-go")){go(btn.getAttribute("data-go"));return}
  if(btn&&btn.id==="btn-export"){exportD();return}
  if(btn&&btn.id==="m-close"){closeM();return}
  if(t.id==="modal"||t.classList.contains("mo")){closeM();return}
  if(btn&&btn.id==="btn-logout"){
    mode="";document.getElementById("app").style.display="none";
    document.getElementById("login-screen").style.display="flex";
    document.getElementById("ls").style.display="none";
    document.getElementById("inp-s").value="";return;
  }

  // MEMBROS
  if(btn&&btn.id==="btn-add"){
    openM("Novo Membro",membroFormHtml());return;
  }
  if(btn&&btn.id==="btn-lote"){
    openM("Importar Lista",'<p style="font-size:12px;color:#666;margin:0 0 10px">Um por linha: <b>Nome, Apelido, Grupo</b></p><div class="ig"><textarea id="f-lote" rows="6" style="font-family:monospace;font-size:13px" placeholder="Fernando, ~Fernando, A"></textarea></div><button class="bt" id="btn-do-lote" style="background:var(--blue)"><span class="bi">\uD83D\uDCE5</span>Importar</button>');
    return;
  }
  if(btn&&btn.classList.contains("ch")&&btn.getAttribute("data-filt")){fM=btn.getAttribute("data-filt");rMembros();return}
  if(btn&&btn.getAttribute("data-edit")){openM("Editar Membro",membroFormHtml(parseInt(btn.getAttribute("data-edit"))));return}
  if(btn&&btn.getAttribute("data-del")){
    if(confirm("Desativar?")){
      var m=D.membros.find(function(x){return x.id===parseInt(btn.getAttribute("data-del"))});
      if(m){m.ativo=false;sv();renderAll()}
    }return;
  }
  if(btn&&btn.getAttribute("data-grp")&&document.getElementById("f-gr")){
    var g=btn.getAttribute("data-grp");
    document.getElementById("f-gr").value=g;
    btn.parentElement.querySelectorAll("button").forEach(function(b){
      var bg=b.getAttribute("data-grp");
      b.style.background=bg===g?GC[bg]:"var(--lg)";
      b.style.color=bg===g?"#fff":"#666";
    });return;
  }
  if(btn&&btn.id==="btn-save-m"){saveMembro();return}
  if(btn&&btn.id==="btn-do-lote"){doLote();return}

  // TAREFAS
  if(btn&&btn.id==="btn-add-tarefa"){tarefaForm();return}
  if(btn&&btn.getAttribute("data-edit-tarefa")!==null&&btn.getAttribute("data-edit-tarefa")!==undefined&&btn.hasAttribute("data-edit-tarefa")){
    tarefaForm(parseInt(btn.getAttribute("data-edit-tarefa")));return;
  }
  if(btn&&btn.hasAttribute("data-del-tarefa")){
    if(confirm("Remover esta tarefa?")){D.tarefas.splice(parseInt(btn.getAttribute("data-del-tarefa")),1);sv();renderAll()}return;
  }
  if(btn&&btn.id==="btn-save-tarefa"){saveTarefa();return}

  // ESCALA
  if(btn&&btn.id==="btn-selecionar-tarefas"){
    var dt=document.getElementById("e-data");
    if(!dt||!dt.value.trim()){alert("Digite a data!");return}
    var allIdx=[];
    D.tarefas.forEach(function(t,i){allIdx.push(i)});
    eS={etapa:"selecionar",dataGira:dt.value.trim(),sel:allIdx,gira:null,esc:null};
    rEscala();return;
  }
  if(btn&&btn.id==="btn-gerar-escala"){
    var selTarefas=eS.sel.map(function(i){return D.tarefas[i]});
    var escala=gerarEsc(selTarefas);
    var gira={id:D.nGid,data:eS.dataGira,status:"rascunho",escala:escala,presenca:{}};
    eS.etapa="preview";eS.gira=gira;eS.esc=escala;
    rEscala();return;
  }
  if(btn&&btn.id==="btn-canc-sel"){eS={etapa:"inicio"};rEscala();return}
  if(btn&&btn.id==="btn-regen"){
    var selTarefas=eS.sel.map(function(i){return D.tarefas[i]});
    eS.esc=gerarEsc(selTarefas);eS.gira.escala=eS.esc;rEscala();return;
  }
  if(btn&&btn.id==="btn-canc"){eS={etapa:"inicio"};rEscala();return}
  if(btn&&btn.id==="btn-pub"){
    var gi=JSON.parse(JSON.stringify(eS.gira));
    gi.status="publicada";D.giras.push(gi);D.nGid++;D.rot=(D.rot+1)%4;
    sv();eS={etapa:"inicio"};renderAll();alert("\u2705 Publicada!");return;
  }
  if(btn&&btn.getAttribute("data-troca")){
    var p=btn.getAttribute("data-troca").split("-");
    trocaForm(parseInt(p[0]),parseInt(p[1]));return;
  }
  if(btn&&btn.getAttribute("data-pick")){
    var mid=parseInt(btn.getAttribute("data-pick"));
    var ei=parseInt(btn.getAttribute("data-ei"));
    var mi=parseInt(btn.getAttribute("data-mi"));
    var m=D.membros.find(function(x){return x.id===mid});
    if(m){eS.esc[ei].membros[mi]=JSON.parse(JSON.stringify(m));eS.gira.escala=eS.esc}
    closeM();rEscala();return;
  }
  if(btn&&btn.getAttribute("data-wpp")){
    var gi=D.giras.find(function(g){return g.id===parseInt(btn.getAttribute("data-wpp"))});
    if(gi){
      openM("\uD83D\uDCF1 WhatsApp",'<pre class="wp">'+esc(wppMsg(gi))+'</pre><button class="bt" id="btn-copy" data-gid="'+gi.id+'" style="background:var(--wpp);margin-top:10px"><span class="bi">\uD83D\uDCCB</span>Copiar</button>');
    }return;
  }
  if(btn&&btn.id==="btn-copy"){
    var gid=parseInt(btn.getAttribute("data-gid"));
    var gi=D.giras.find(function(g){return g.id===gid});
    if(gi){
      navigator.clipboard.writeText(wppMsg(gi)).then(function(){
        btn.innerHTML='<span class="bi">\u2705</span>Copiado!';
        setTimeout(function(){btn.innerHTML='<span class="bi">\uD83D\uDCCB</span>Copiar'},2000);
      }).catch(function(){alert("Copie manualmente.")});
    }return;
  }
  if(btn&&btn.getAttribute("data-gopres")){pGid=parseInt(btn.getAttribute("data-gopres"));go("presenca");return}

  // PRESENCA
  if(div&&div.getAttribute("data-pgira")){pGid=parseInt(div.getAttribute("data-pgira"));rPresenca();return}
  if(btn&&btn.id==="btn-pvolt"){pGid=null;rPresenca();return}
  if(btn&&btn.getAttribute("data-pmark")){
    var p=btn.getAttribute("data-pmark").split("-");
    var gi=D.giras.find(function(g){return g.id===pGid});
    if(gi){if(!gi.presenca)gi.presenca={};gi.presenca[parseInt(p[0])]=p[1];sv();rPresenca()}return;
  }

  // MENSALIDADE
  if(btn&&btn.getAttribute("data-mens")){
    var p=btn.getAttribute("data-mens").split("-");
    var ma=mesAno();D.mensalidades[ma+"_"+parseInt(p[0])]=p[1];sv();rMensalidade();return;
  }

  // DOACOES
  if(btn&&btn.id==="btn-add-item"){
    openM("Novo Item",'<div class="ig"><label>Nome do item</label><input id="f-item" placeholder="Ex: Pacote de velas"></div><button class="bt" id="btn-save-item" style="background:var(--green)"><span class="bi">\u2705</span>Adicionar</button>');
    return;
  }
  if(btn&&btn.id==="btn-save-item"){
    var v=document.getElementById("f-item").value.trim();
    if(v){D.itensDoacao.push(v);sv();closeM();renderAll()}return;
  }
  if(btn&&btn.hasAttribute("data-delitem")){D.itensDoacao.splice(parseInt(btn.getAttribute("data-delitem")),1);sv();renderAll();return}
  if(btn&&btn.id==="btn-sortear"){
    if(confirm("Sortear?")){
      var a=shuf(atv()),itens=D.itensDoacao,ma=mesAno(),res=[];
      for(var i=0;i<a.length;i++){res.push({id:a[i].id,nome:a[i].nome,grupo:a[i].grupo,apelido:a[i].apelido,item:itens[i%itens.length]})}
      D.sorteios[ma]=res;sv();renderAll();alert("\u2705 Sorteio realizado!");
    }return;
  }
  if(btn&&btn.id==="btn-wpp-doacao"){
    var ma=mesAno(),s=D.sorteios[ma];
    if(s){
      var m="\uD83C\uDF81 *Doa\u00E7\u00F5es do m\u00EAs \u2014 "+ma+"*\n\n";
      s.forEach(function(x){m+="\u2022 "+(x.apelido?"@"+x.apelido:x.nome)+" \u2192 *"+x.item+"*\n"});
      m+="\nAx\u00E9! \uD83D\uDE4F";
      navigator.clipboard.writeText(m).then(function(){alert("\u2705 Copiado!")});
    }return;
  }

  // CALENDARIO
  if(btn&&btn.id==="btn-add-cal"){
    openM("Novo Evento",'<div class="ig"><label>T\u00EDtulo</label><input id="f-cal-tit"></div><div class="ig"><label>Data</label><input id="f-cal-data" placeholder="Ex: 15/06/2026"></div><div class="ig"><label>Descri\u00E7\u00E3o</label><input id="f-cal-desc"></div><button class="bt" id="btn-save-cal" style="background:var(--blue)"><span class="bi">\u2705</span>Adicionar</button>');
    return;
  }
  if(btn&&btn.id==="btn-save-cal"){
    var tit=document.getElementById("f-cal-tit").value.trim();
    var dt=document.getElementById("f-cal-data").value.trim();
    var desc=document.getElementById("f-cal-desc").value.trim();
    if(tit&&dt){D.calendario.push({titulo:tit,data:dt,desc:desc});sv();closeM();renderAll()}
    return;
  }
  if(btn&&btn.hasAttribute("data-delcal")){D.calendario.splice(parseInt(btn.getAttribute("data-delcal")),1);sv();renderAll();return}

  // AVISOS
  if(btn&&btn.id==="btn-add-aviso"){
    openM("Novo Aviso",'<div class="ig"><label>T\u00EDtulo</label><input id="f-av-tit"></div><div class="ig"><label>Mensagem</label><textarea id="f-av-txt" rows="4"></textarea></div><button class="bt" id="btn-save-aviso" style="background:var(--orange)"><span class="bi">\uD83D\uDCE2</span>Publicar</button>');
    return;
  }
  if(btn&&btn.id==="btn-save-aviso"){
    var tit=document.getElementById("f-av-tit").value.trim();
    var txt=document.getElementById("f-av-txt").value.trim();
    if(tit&&txt){D.avisos.push({titulo:tit,texto:txt,data:new Date().toLocaleDateString("pt-BR")});sv();closeM();renderAll()}
    return;
  }
  if(btn&&btn.hasAttribute("data-delaviso")){D.avisos.splice(parseInt(btn.getAttribute("data-delaviso")),1);sv();renderAll();return}
});

// Checkbox handler for escala selection
document.addEventListener("change",function(ev){
  var t=ev.target;
  if(t.id==="file-import"){
    var f=t.files[0];
    if(f){var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.membros){D=d;sv();renderAll();alert("\u2705 Importado!")}}catch(ex){alert("\u274C Erro")}};r.readAsText(f)}
    t.value="";return;
  }
  if(t.hasAttribute("data-sel-tarefa")){
    var idx=parseInt(t.getAttribute("data-sel-tarefa"));
    if(t.checked){if(eS.sel.indexOf(idx)<0)eS.sel.push(idx)}
    else{eS.sel=eS.sel.filter(function(x){return x!==idx})}
    return;
  }
});

// HELPERS
function membroFormHtml(eid){
  var m=eid?D.membros.find(function(x){return x.id===eid}):null;
  var nm=m?esc(m.nome):"";
  var ap=m?esc(m.apelido||""):"";
  var gr=m?m.grupo:"A";
  var h='<div class="ig"><label>Nome completo</label><input id="f-nm" value="'+nm+'"></div>';
  h+='<div class="ig"><label>Apelido/WhatsApp</label><input id="f-ap" value="'+ap+'"></div>';
  h+='<div class="ig"><label>Grupo</label><div class="fx gp6">';
  GR.forEach(function(g){
    h+='<button data-grp="'+g+'" style="flex:1;padding:10px;border-radius:10px;background:'+(gr===g?GC[g]:"var(--lg)")+';color:'+(gr===g?"#fff":"#666")+';font-weight:800;font-size:16px">'+g+'</button>';
  });
  h+='</div></div>';
  h+='<input type="hidden" id="f-gr" value="'+gr+'">';
  h+='<input type="hidden" id="f-eid" value="'+(eid||"")+'">';
  h+='<button class="bt" id="btn-save-m" style="background:var(--dk3)">';
  h+='<span class="bi">\u2705</span> '+(m?"Salvar":"Cadastrar")+'</button>';
  return h;
}

function saveMembro(){
  var nm=document.getElementById("f-nm").value.trim();
  if(!nm){alert("Nome!");return}
  var ap=document.getElementById("f-ap").value.trim()||null;
  var gr=document.getElementById("f-gr").value;
  var eid=document.getElementById("f-eid").value;
  if(eid){
    var m=D.membros.find(function(x){return x.id===parseInt(eid)});
    if(m){m.nome=nm;m.apelido=ap;m.grupo=gr}
  }else{
    D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});
  }
  sv();closeM();renderAll();
}

function doLote(){
  var txt=document.getElementById("f-lote").value.trim();
  if(!txt)return;
  var ok=0;
  txt.split("\n").forEach(function(l){
    var p=l.split(",").map(function(x){return x.trim()});
    if(p.length>=2){
      var nm=p[0],ap=p[1]||null,gr=(p[2]||"A").toUpperCase();
      if(GR.indexOf(gr)>=0&&nm){D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});ok++}
    }
  });
  sv();closeM();renderAll();alert("\u2705 "+ok+" importados!");
}

function saveTarefa(){
  var fase=document.getElementById("f-fase").value;
  var nome=document.getElementById("f-tnome").value.trim();
  var qtd=parseInt(document.getElementById("f-tqtd").value)||1;
  var idx=document.getElementById("f-tidx").value;
  if(!nome){alert("Nome da tarefa!");return}
  var fixos=[];
  document.querySelectorAll("[data-fixo-id]").forEach(function(cb){
    if(cb.checked)fixos.push(parseInt(cb.getAttribute("data-fixo-id")));
  });
  if(idx!==""){
    var t=D.tarefas[parseInt(idx)];
    t.fase=fase;t.nome=nome;t.qtd=qtd;t.fixos=fixos;
  }else{
    D.tarefas.push({fase:fase,nome:nome,qtd:qtd,fixos:fixos});
  }
  sv();closeM();renderAll();
}

function trocaForm(ei,mi){
  var a=atv();
  var at=eS.esc[ei].membros[mi];
  var h='<p style="font-size:12px;color:#666;margin:0 0 10px">Substituindo: <b>'+esc(at.nome)+'</b></p>';
  h+='<div style="max-height:250px;overflow:auto;display:flex;flex-direction:column;gap:4px">';
  a.forEach(function(m){
    h+='<button data-pick="'+m.id+'" data-ei="'+ei+'" data-mi="'+mi+'"';
    h+=' style="padding:8px 12px;border-radius:10px;border:1px solid #eee;background:'+(m.id===at.id?"#e8f5e9":"#fff");
    h+=';display:flex;align-items:center;gap:6px;text-align:left;width:100%">';
    h+=gb(m.grupo)+'<span style="font-size:13px">'+esc(m.nome)+'</span></button>';
  });
  h+='</div>';
  openM("Trocar",h);
}
