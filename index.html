<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Casa de Iansa</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--dk:#1a1a2e;--dk2:#16213e;--dk3:#0f3460;--gold:#f0c040;--gold2:#e6a817;--red:#e74c3c;--blue:#3498db;--green:#2ecc71;--orange:#f39c12;--purple:#9b59b6;--wpp:#25d366;--gray:#888;--lg:#f0f0f0}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:80px;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none}
input,textarea,select{font-family:inherit}
.hdr{background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));color:#fff;padding:18px 16px 14px;border-radius:0 0 24px 24px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.hdr-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.hdr-row img{width:40px;height:40px;border-radius:50%;background:#fff;padding:2px;object-fit:contain}
.hdr-nm{font-size:11px;letter-spacing:1px;opacity:.85;font-family:Georgia,serif;line-height:1.2}
.hdr-t{font-size:22px;font-weight:800;font-family:Georgia,serif;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-i{margin-top:3px;opacity:.7;font-size:12px}
.tbar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,var(--dk),var(--dk2));display:flex;justify-content:space-around;padding:4px 0 max(6px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.1);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.tb{background:none;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:1px;font-size:9px;padding:3px 6px;transition:.2s}
.tb.on{color:var(--gold);font-weight:700;transform:scale(1.05)}
.tb .ic{font-size:18px}
.cd{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:10px}
.bt{width:100%;padding:12px 16px;border-radius:12px;color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;margin-bottom:8px}
.bt:disabled{background:#ccc!important}
.bt .bi{font-size:18px}
.bt-sm{padding:8px 14px;font-size:13px;width:auto;display:inline-flex;margin:0}
.gb{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;color:#fff;font-size:11px;font-weight:800;flex-shrink:0}
.gA{background:var(--red)}.gB{background:var(--blue)}.gC{background:var(--green)}.gD{background:var(--orange)}
.ig{margin-bottom:12px}
.ig label{font-size:11px;font-weight:700;color:#666;display:block;margin-bottom:3px}
.ig input,.ig textarea,.ig select{width:100%;padding:10px 12px;border:2px solid #e8e8e8;border-radius:10px;font-size:15px;outline:none;transition:.2s}
.ig input:focus,.ig textarea:focus,.ig select:focus{border-color:var(--dk3)}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
.mo.vis{display:flex}
.mc{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:85vh;overflow:auto;padding:16px 14px max(14px,env(safe-area-inset-bottom));animation:su .3s ease}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mh h2{font-size:18px;font-weight:800;color:var(--dk)}
.mx{background:var(--lg);border-radius:50%;width:34px;height:34px;font-size:16px;display:flex;align-items:center;justify-content:center}
.ch{padding:6px 14px;border-radius:18px;background:var(--lg);color:#666;font-weight:700;font-size:12px;white-space:nowrap}
.ch.on{background:var(--dk);color:#fff}
.fh{padding:8px 12px;border-radius:10px;color:#fff;font-weight:800;font-size:13px;margin-top:4px;margin-bottom:6px}
.sb{width:34px;height:34px;border-radius:8px;font-size:15px;background:var(--lg);transition:.15s}
.pg{height:4px;border-radius:2px;background:var(--lg);overflow:hidden;margin-top:4px}
.pf{height:100%;border-radius:2px;transition:width .5s}
.page{display:none}.page.on{display:block}
.ct{padding:14px;display:flex;flex-direction:column;gap:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.fx{display:flex}.fc{flex-direction:column}.ac{align-items:center}.jb{justify-content:space-between}.fw{flex-wrap:wrap}
.gp4{gap:4px}.gp6{gap:6px}.gp8{gap:8px}
.ng{background:linear-gradient(135deg,#fff9e6,#fff3cc);border:1px solid var(--gold);border-radius:14px;padding:14px}
.ng .nt{font-size:13px;font-weight:700;color:#8a6d00}
.ng .nd{font-size:12px;color:#8a6d00;margin-top:3px}
.wp{background:var(--lg);padding:10px;border-radius:10px;font-size:11px;white-space:pre-wrap;word-break:break-word;max-height:250px;overflow:auto;line-height:1.4;font-family:monospace}
.mc2{padding:5px 10px;border-radius:18px;border:1px solid #ddd;background:#f8f8f8;font-size:12px;display:inline-flex;align-items:center;gap:4px}
.aviso-card{background:linear-gradient(135deg,#fff9e6,#fffde8);border-left:4px solid var(--gold);border-radius:0 12px 12px 0;padding:12px 14px;margin-bottom:8px}
.cal-item{padding:10px 12px;border-left:4px solid var(--blue);border-radius:0 10px 10px 0;background:#f8faff;margin-bottom:6px}
.chk-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.chk-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--green)}
.fix-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:#e8f5e9;color:#2e7d32}
.login-bg{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--dk),var(--dk2),var(--dk3));padding:20px}
.loading{text-align:center;padding:40px;color:var(--gray)}
.loading .spin{display:inline-block;width:30px;height:30px;border:3px solid var(--lg);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="login-screen" class="login-bg">
<img id="login-logo" style="width:80px;height:80px;border-radius:50%;background:#fff;padding:4px;object-fit:contain;margin-bottom:16px" alt="Logo">
<div style="color:#fff;font-family:Georgia,serif;font-size:20px;font-weight:800;text-align:center;margin-bottom:4px">Centro Afro-Religioso</div>
<div style="color:var(--gold);font-family:Georgia,serif;font-size:24px;font-weight:800;text-align:center;margin-bottom:24px">Casa de Iansa</div>
<button id="btn-ef" class="bt" style="background:var(--green);max-width:280px"><span class="bi">👤</span> Entrar como Filho</button>
<button id="btn-ea" class="bt" style="background:var(--dk3);max-width:280px"><span class="bi">🔐</span> Entrar como Admin</button>
<div id="ls" style="display:none;margin-top:12px;width:100%;max-width:280px">
<div class="ig"><input id="inp-s" type="password" placeholder="Digite a senha" style="text-align:center;background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.3)"></div>
<div style="display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:12px"><input type="checkbox" id="chk-lembrar" style="width:18px;height:18px;accent-color:var(--gold)"><label for="chk-lembrar" style="color:rgba(255,255,255,.7);font-size:13px">Lembrar senha</label></div>
<button id="btn-lg" class="bt" style="background:var(--gold);color:var(--dk)"><span class="bi">🔓</span> Entrar</button>
<div id="lg-err" style="color:var(--red);text-align:center;font-size:12px;margin-top:6px;display:none">Senha incorreta!</div>
</div>
</div>
<div id="app" style="display:none">
<div id="p-home" class="page on"></div>
<div id="p-membros" class="page"></div>
<div id="p-tarefas" class="page"></div>
<div id="p-escala" class="page"></div>
<div id="p-presenca" class="page"></div>
<div id="p-relatorio" class="page"></div>
<div id="p-mensalidade" class="page"></div>
<div id="p-doacoes" class="page"></div>
<div id="p-calendario" class="page"></div>
<div id="p-avisos" class="page"></div>
<div class="tbar" id="tbar"></div>
<div id="modal" class="mo"><div class="mc"><div class="mh"><h2 id="m-title"></h2><button class="mx" id="m-close">\u2715</button></div><div id="m-body"></div></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ========== FIREBASE INIT ==========
firebase.initializeApp({
  apiKey:"AIzaSyACOP0FUNgs7PD3xaYA7QQhnUqnhtr8u00",
  authDomain:"casadeiansa-4497a.firebaseapp.com",
  projectId:"casadeiansa-4497a",
  storageBucket:"casadeiansa-4497a.firebasestorage.app",
  messagingSenderId:"861721911332",
  appId:"1:861721911332:web:5fb8880de37142154278b1"
});
var db=firebase.firestore();
var LOGO="logo.png";
var PASS_PADRAO="iansa2026";
var GR=["A","B","C","D"];
var GC={A:"#e74c3c",B:"#3498db",C:"#2ecc71",D:"#f39c12"};
var SM={presente:{i:"\u2705",l:"Presente",c:"#2ecc71"},faltou:{i:"\u274C",l:"Faltou",c:"#e74c3c"},avisou:{i:"\uD83D\uDD14",l:"Avisou",c:"#f39c12"},trocou:{i:"\uD83D\uDD04",l:"Trocou",c:"#3498db"}};
var FASES_PADRAO=["PR\u00C9","DURANTE","P\u00D3S"];
var FCOR={"PR\u00C9":"var(--orange)","DURANTE":"var(--blue)","P\u00D3S":"var(--green)","PR\u00C9-GIRA":"var(--orange)","DURANTE A GIRA":"var(--blue)","P\u00D3S-GIRA":"var(--green)"};

var D={membros:[],giras:[],tarefas:[],tiposEscala:["Gira"],rot:0,nMid:1,nGid:1,mensalidades:{},itensDoacao:[],sorteios:{},calendario:[],avisos:[],inscricaoAtiva:false,inscricaoLabel:"",inscricoes:[]};
var mode="",cTab="home",fM="todos",fTipo="Gira",eS={etapa:"inicio",gira:null,esc:null,sel:null,tipo:"Gira"},pGid=null;
var dataLoaded=false;

// ========== FIRESTORE HELPERS ==========
var DOC_REF=db.collection("app").doc("data");

function loadFromFirebase(cb){
  DOC_REF.get().then(function(doc){
    if(doc.exists){
      D=doc.data();
      if(!D.membros)D.membros=[];
      if(!D.giras)D.giras=[];
      if(!D.tarefas||!D.tarefas.length)D.tarefas=defaultTarefas();
      if(!D.mensalidades)D.mensalidades={};
      if(!D.valorMensalidade)D.valorMensalidade=0;
      if(!D.tiposEscala||!D.tiposEscala.length)D.tiposEscala=["Gira"];
      if(!D.senhaAdmin)D.senhaAdmin=PASS_PADRAO;
      if(!D.itensDoacao)D.itensDoacao=[];
      if(!D.sorteios)D.sorteios={};
      if(!D.calendario)D.calendario=[];
      if(!D.avisos)D.avisos=[];
      if(!D.rot)D.rot=0;
      if(!D.nMid)D.nMid=1;
      if(!D.nGid)D.nGid=1;
      D.tarefas.forEach(function(t){
        if(!t.fixos)t.fixos=[];
        if(!t.tipo)t.tipo="Gira";
        if(t.fase==="PR\u00C9-GIRA")t.fase="PR\u00C9";
        if(t.fase==="DURANTE A GIRA")t.fase="DURANTE";
        if(t.fase==="P\u00D3S-GIRA")t.fase="P\u00D3S";
      });
    }else{
      D.tarefas=defaultTarefas();
      sv();
    }
    dataLoaded=true;
    if(cb)cb();
  }).catch(function(err){
    console.error("Firebase load error:",err);
    D.tarefas=defaultTarefas();
    dataLoaded=true;
    if(cb)cb();
  });
}

function sv(){
  DOC_REF.set(JSON.parse(JSON.stringify(D))).catch(function(err){
    console.error("Firebase save error:",err);
  });
}

function defaultTarefas(){
  return[
    {tipo:"Gira",fase:"PR\u00C9",nome:"Filho de Trabalho Respons\u00E1vel",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Varrer e passar pano no terreiro + cuspidores",qtd:4,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Varrer cal\u00E7ada e guardar vassouras/rodos/bacias",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Varrer, passar pano e organizar o 2\u00BA andar",qtd:3,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Limpar as cadeiras",qtd:2,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Organizar a cozinha",qtd:2,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Lavar os 3 banheiros e repor utens\u00EDlios",qtd:3,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Lavar panos de ch\u00E3o e estender",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Estoque",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"PR\u00C9",nome:"Cuidar da casinha de Exu",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"DURANTE",nome:"Caixa",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"DURANTE",nome:"Cantina",qtd:2,fixos:[]},
    {tipo:"Gira",fase:"DURANTE",nome:"Chamar a assist\u00EAncia",qtd:3,fixos:[]},
    {tipo:"Gira",fase:"P\u00D3S",nome:"Respons\u00E1vel P\u00F3s-Gira",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"P\u00D3S",nome:"Arrumar a cozinha",qtd:2,fixos:[]},
    {tipo:"Gira",fase:"P\u00D3S",nome:"Lavar os 2 banheiros",qtd:2,fixos:[]},
    {tipo:"Gira",fase:"P\u00D3S",nome:"Varrer e passar pano + guardar cuspidores/copos de vela",qtd:4,fixos:[]},
    {tipo:"Gira",fase:"P\u00D3S",nome:"Tirar lixo, guardar vassouras, lavar panos",qtd:1,fixos:[]},
    {tipo:"Gira",fase:"P\u00D3S",nome:"Organizar 2\u00BA andar (verificar pertences)",qtd:1,fixos:[]}
  ];
}

function atv(){return D.membros.filter(function(m){return m.ativo})}
function gp(){return D.giras.filter(function(g){return g.status==="publicada"})}
function shuf(a){a=[].concat(a);for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}return a}
function esc(s){return s?String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):""}
function gb(g){return '<span class="gb g'+g+'">'+g+'</span>'}
function isA(){return mode==="admin"}
function mesAno(){var d=new Date();return(d.getMonth()+1)+"/"+d.getFullYear()}

// ========== LOGIN ==========
document.getElementById("login-logo").src=LOGO;
document.getElementById("btn-ef").addEventListener("click",function(){mode="filho";startApp()});
document.getElementById("btn-ea").addEventListener("click",function(){
  document.getElementById("ls").style.display="block";
  var saved=localStorage.getItem("terreiro_saved_pass");
  if(saved){document.getElementById("inp-s").value=saved;document.getElementById("chk-lembrar").checked=true}
});
document.getElementById("btn-lg").addEventListener("click",doLogin);
document.getElementById("inp-s").addEventListener("keydown",function(ev){if(ev.key==="Enter")doLogin()});
function doLogin(){
  var senhaDigitada=document.getElementById("inp-s").value;
  var lembrar=document.getElementById("chk-lembrar").checked;
  DOC_REF.get().then(function(doc){
    var senhaCorreta=PASS_PADRAO;
    if(doc.exists&&doc.data().senhaAdmin){senhaCorreta=doc.data().senhaAdmin}
    if(senhaDigitada===senhaCorreta){
      if(lembrar){localStorage.setItem("terreiro_saved_pass",senhaDigitada)}
      else{localStorage.removeItem("terreiro_saved_pass")}
      mode="admin";startApp();
    }else{var el=document.getElementById("lg-err");el.style.display="block";setTimeout(function(){el.style.display="none"},2000)}
  }).catch(function(){
    if(senhaDigitada===PASS_PADRAO){
      if(lembrar){localStorage.setItem("terreiro_saved_pass",senhaDigitada)}
      else{localStorage.removeItem("terreiro_saved_pass")}
      mode="admin";startApp();
    }else{var el=document.getElementById("lg-err");el.style.display="block";setTimeout(function(){el.style.display="none"},2000)}
  });
}
function startApp(){
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="block";
  buildTabs();
  // Show loading
  document.getElementById("p-home").innerHTML='<div class="loading"><div class="spin"></div><div style="margin-top:12px">Carregando dados...</div></div>';
  document.getElementById("p-home").classList.add("on");
  loadFromFirebase(function(){
    setLogos();go("home");
  });
}

// ========== TABS ==========
function buildTabs(){
  var tabs=isA()?[
    {id:"home",ic:"\uD83C\uDFE0",l:"In\u00EDcio"},{id:"membros",ic:"\uD83D\uDC65",l:"Membros"},
    {id:"tarefas",ic:"\uD83D\uDCCB",l:"Tarefas"},{id:"escala",ic:"\u2699\uFE0F",l:"Escala"},
    {id:"mensalidade",ic:"\uD83D\uDCB0",l:"Mensal."}
  ]:[
    {id:"home",ic:"\uD83C\uDFE0",l:"In\u00EDcio"},{id:"escala",ic:"\uD83D\uDCCB",l:"Escala"},
    {id:"calendario",ic:"\uD83D\uDCC5",l:"Calend\u00E1rio"},{id:"avisos",ic:"\uD83D\uDCE2",l:"Avisos"},
    {id:"doacoes",ic:"\uD83C\uDF81",l:"Doa\u00E7\u00F5es"}
  ];
  var h="";
  tabs.forEach(function(t){
    h+='<button class="tb'+(t.id==="home"?" on":"")+'" data-tab="'+t.id+'">';
    h+='<span class="ic">'+t.ic+'</span><span>'+t.l+'</span></button>';
  });
  document.getElementById("tbar").innerHTML=h;
}

function go(tab){
  cTab=tab;
  if(tab==="escala")eS={etapa:"inicio",gira:null,esc:null,sel:null};
  if(tab==="presenca")pGid=null;
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("on")});
  var el=document.getElementById("p-"+tab);
  if(el)el.classList.add("on");
  document.querySelectorAll(".tb").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-tab")===tab)});
  // Reload from firebase on tab change for filho mode
  if(!isA()&&dataLoaded){
    loadFromFirebase(function(){renderAll()});
  }else{
    renderAll();
  }
}

function mkHdr(t,sub){
  var h='<div class="hdr"><div class="hdr-row"><img class="li" alt="Logo">';
  h+='<div class="hdr-nm">Centro Afro-Religioso<br>Casa de Iansa</div></div>';
  h+='<div class="hdr-t">'+t+'</div>';
  if(sub)h+='<div class="hdr-i">'+sub+'</div>';
  return h+'</div>';
}
function setLogos(){document.querySelectorAll(".li").forEach(function(i){i.src=LOGO})}
function openM(t,h){document.getElementById("m-title").textContent=t;document.getElementById("m-body").innerHTML=h;document.getElementById("modal").classList.add("vis")}
function closeM(){document.getElementById("modal").classList.remove("vis")}

// ========== ALL RENDER FUNCTIONS ==========
// (Same as v4 but with sv() calling Firebase instead of localStorage)


function rHome(){
  var a=atv(),p=gp(),el=document.getElementById("p-home");
  var h=mkHdr("Gest\u00E3o da Casa","Ax\u00E9! "+(isA()?"Modo Administrador":"Modo Filho"));
  h+='<div class="ct">';
  h+='<div class="cd"><div class="fx jb ac"><div>';
  h+='<div style="font-size:12px;color:var(--gray);font-weight:600">Membros ativos</div>';
  h+='<div style="font-size:32px;font-weight:800;color:var(--dk)">'+a.length+'</div>';
  h+='</div><div class="fx gp6">';
  GR.forEach(function(g){
    var n=a.filter(function(m){return m.grupo===g}).length;
    h+='<div style="text-align:center">'+gb(g)+'<div style="font-size:10px;font-weight:700;margin-top:1px">'+n+'</div></div>';
  });
  h+='</div></div></div>';
  if(D.avisos.length){
    var av=D.avisos[D.avisos.length-1];

function gerarEsc(tarefasSel){
  var a=atv(),rot=D.rot,todosFixos={};
  tarefasSel.forEach(function(t){if(t.fixos)t.fixos.forEach(function(fid){todosFixos[fid]=true})});
  var sorteiaveis=a.filter(function(m){return!todosFixos[m.id]});
  var mg={};GR.forEach(function(g){mg[g]=shuf(sorteiaveis.filter(function(m){return m.grupo===g}))});
  var ic={A:0,B:0,C:0,D:0},res=[];
  tarefasSel.forEach(function(t,ti){
    var membros=[];
    if(t.fixos&&t.fixos.length){t.fixos.forEach(function(fid){var m=D.membros.find(function(x){return x.id===fid});if(m)membros.push(JSON.parse(JSON.stringify(m)))})}
    var falta=t.qtd-membros.length;
    if(falta>0){var gi=(ti+rot)%4,g=GR[gi],pool=mg[g];for(var i=0;i<falta;i++){if(pool&&pool.length){membros.push(JSON.parse(JSON.stringify(pool[ic[g]%pool.length])));ic[g]++}}}
    res.push({fase:t.fase,tarefa:t.nome,qtd:t.qtd,membros:membros});
  });
  return res;
}

        hv+='<div style="margin-top:12px;padding:10px;background:#fff9e6;border-radius:10px;font-size:12px;color:#8a6d00;text-align:center">\u26A0\uFE0F Aguardando inscrições dos filhos</div>';
      }
      openM("\uD83D\uDC65 Voluntários — "+esc(gi.data),hv);
    }return}
  if(btn&&btn.id==="btn-sortear-vol"){
    var gid=parseInt(btn.getAttribute("data-gid")),gi=D.giras.find(function(g){return g.id===gid});
    if(!gi){return}
    var vol=gi.voluntarios||[];
    if(!vol.length){alert("Nenhum voluntário ainda!");return}
    var tipo=gi.tipo||"Gira";
    var tarefasTipo=D.tarefas.filter(function(t){return t.tipo===tipo&&t.fase!=="DURANTE"});
    if(!tarefasTipo.length){alert("Nenhuma tarefa de PRÉ/PÓS cadastrada!");return}
    var poolPre=shuf(vol.filter(function(v){return v.disp==="PRÉ"||v.disp==="PRÉ e PÓS"}));
    var poolPos=shuf(vol.filter(function(v){return v.disp==="PÓS"||v.disp==="PRÉ e PÓS"}));
    var novaEscala=[];
    tarefasTipo.forEach(function(t){
      var pool=t.fase==="PRÉ"?poolPre:poolPos;
      var membros=[];
      for(var i=0;i<t.qtd;i++){
        if(pool.length){membros.push({nome:pool[i%pool.length].nome,cel:pool[i%pool.length].cel,grupo:"A",id:null})}
      }
      novaEscala.push({fase:t.fase,tarefa:t.nome,qtd:t.qtd,membros:membros});
    });
    gi.escala=novaEscala;
    gi.sorteadoVol=true;
    sv();closeM();renderAll();
    alert("\u2705 Escala sorteada com os voluntários!");return}
  if(btn&&btn.getAttribute("data-wpp")){var gi=D.giras.find(function(g){return g.id===parseInt(btn.getAttribute("data-wpp"))});if(gi)openM("\uD83D\uDCF1 WhatsApp",'<pre class="wp">'+esc(wppMsg(gi))+'</pre><button class="bt" id="btn-copy" data-gid="'+gi.id+'" style="background:var(--wpp);margin-top:10px">\uD83D\uDCCB Copiar</button>');return}
  if(btn&&btn.id==="btn-copy"){var gid=parseInt(btn.getAttribute("data-gid")),gi=D.giras.find(function(g){return g.id===gid});if(gi)navigator.clipboard.writeText(wppMsg(gi)).then(function(){btn.textContent="\u2705 Copiado!";setTimeout(function(){btn.textContent="\uD83D\uDCCB Copiar"},2000)});return}
  if(btn&&btn.getAttribute("data-gopres")){pGid=parseInt(btn.getAttribute("data-gopres"));go("presenca");return}
  if(btn&&btn.getAttribute("data-delgira")){if(confirm("Tem certeza que deseja apagar esta gira? Essa a\u00E7\u00E3o n\u00E3o pode ser desfeita.")){var gid=parseInt(btn.getAttribute("data-delgira"));D.giras=D.giras.filter(function(g){return g.id!==gid});sv();renderAll()}return}
  if(div&&div.getAttribute("data-pgira")){pGid=parseInt(div.getAttribute("data-pgira"));rPresenca();return}
  if(btn&&btn.id==="btn-pvolt"){pGid=null;rPresenca();return}
  if(btn&&btn.getAttribute("data-pmark")){var p=btn.getAttribute("data-pmark").split("-");var gi=D.giras.find(function(g){return g.id===pGid});if(gi){if(!gi.presenca)gi.presenca={};gi.presenca[parseInt(p[0])]=p[1];sv();rPresenca()}return}
  if(btn&&btn.getAttribute("data-mens")){var p=btn.getAttribute("data-mens").split("-");D.mensalidades[mesAno()+"_"+parseInt(p[0])]=p[1];sv();rMensalidade();return}
  if(btn&&btn.id==="btn-edit-valor"){openM("Valor da Mensalidade",'<div class="ig"><label>Valor (R$)</label><input id="f-valor" type="number" step="0.01" min="0" value="'+(D.valorMensalidade||"")+'" placeholder="Ex: 100"></div><button class="bt" id="btn-save-valor" style="background:var(--green)">\u2705 Salvar</button>');return}
  if(btn&&btn.id==="btn-save-valor"){var v=parseFloat(document.getElementById("f-valor").value);if(!isNaN(v)&&v>=0){D.valorMensalidade=v;sv();closeM();renderAll()}else{alert("Digite um valor!")}return}
  if(btn&&btn.id==="btn-add-item"){openM("Novo Item",'<div class="ig"><label>Item</label><input id="f-item"></div><button class="bt" id="btn-save-item" style="background:var(--green)">\u2705 Adicionar</button>');return}
  if(btn&&btn.id==="btn-save-item"){var v=document.getElementById("f-item").value.trim();if(v){D.itensDoacao.push(v);sv();closeM();renderAll()}return}
  if(btn&&btn.hasAttribute("data-delitem")){D.itensDoacao.splice(parseInt(btn.getAttribute("data-delitem")),1);sv();renderAll();return}
  if(btn&&btn.id==="btn-sortear"){if(confirm("Sortear?")){var a=shuf(atv()),it=D.itensDoacao,ma=mesAno(),r=[];for(var i=0;i<a.length;i++)r.push({id:a[i].id,nome:a[i].nome,grupo:a[i].grupo,apelido:a[i].apelido,item:it[i%it.length]});D.sorteios[ma]=r;sv();renderAll();alert("\u2705 Sorteado!")}return}
  if(btn&&btn.id==="btn-wpp-doacao"){var ma=mesAno(),s=D.sorteios[ma];if(s){var m="\uD83C\uDF81 *Doa\u00E7\u00F5es "+ma+"*\n\n";s.forEach(function(x){m+="\u2022 "+(x.apelido?"@"+x.apelido:x.nome)+" \u2192 *"+x.item+"*\n"});navigator.clipboard.writeText(m).then(function(){alert("\u2705 Copiado!")})}return}
  if(btn&&btn.id==="btn-add-cal"){openM("Evento",'<div class="ig"><label>T\u00EDtulo</label><input id="f-cal-tit"></div><div class="ig"><label>Data</label><input id="f-cal-data"></div><div class="ig"><label>Desc</label><input id="f-cal-desc"></div><button class="bt" id="btn-save-cal" style="background:var(--blue)">\u2705 Salvar</button>');return}
  if(btn&&btn.id==="btn-save-cal"){var tit=document.getElementById("f-cal-tit").value.trim(),dt=document.getElementById("f-cal-data").value.trim();if(tit&&dt){D.calendario.push({titulo:tit,data:dt,desc:document.getElementById("f-cal-desc").value.trim()});sv();closeM();renderAll()}return}
  if(btn&&btn.hasAttribute("data-delcal")){D.calendario.splice(parseInt(btn.getAttribute("data-delcal")),1);sv();renderAll();return}
  if(btn&&btn.id==="btn-add-aviso"){openM("Aviso",'<div class="ig"><label>T\u00EDtulo</label><input id="f-av-tit"></div><div class="ig"><label>Mensagem</label><textarea id="f-av-txt" rows="4"></textarea></div><button class="bt" id="btn-save-aviso" style="background:var(--orange)">\uD83D\uDCE2 Publicar</button>');return}
  if(btn&&btn.id==="btn-save-aviso"){var tit=document.getElementById("f-av-tit").value.trim(),txt=document.getElementById("f-av-txt").value.trim();if(tit&&txt){D.avisos.push({titulo:tit,texto:txt,data:new Date().toLocaleDateString("pt-BR")});sv();closeM();renderAll()}return}
  if(btn&&btn.hasAttribute("data-delaviso")){D.avisos.splice(parseInt(btn.getAttribute("data-delaviso")),1);sv();renderAll();return}
});

document.addEventListener("change",function(ev){
  var t=ev.target;
  if(t.id==="file-import"){var f=t.files[0];if(f){var r=new FileReader();r.onload=function(e){try{var d=JSON.parse(e.target.result);if(d.membros){D=d;sv();renderAll();alert("\u2705 OK")}}catch(ex){alert("\u274C Erro")}};r.readAsText(f)}t.value="";return}
  if(t.hasAttribute("data-sel-tarefa")){var idx=parseInt(t.getAttribute("data-sel-tarefa"));if(t.checked){if(eS.sel.indexOf(idx)<0)eS.sel.push(idx)}else{eS.sel=eS.sel.filter(function(x){return x!==idx})}return}
});

// FORM HELPERS
function mFormH(eid){
  var m=eid?D.membros.find(function(x){return x.id===eid}):null;
  var nm=m?esc(m.nome):"",ap=m?esc(m.apelido||""):"",gr=m?m.grupo:"A";
  var h='<div class="ig"><label>Nome</label><input id="f-nm" value="'+nm+'"></div>';
  h+='<div class="ig"><label>Apelido</label><input id="f-ap" value="'+ap+'"></div>';
  h+='<div class="ig"><label>Grupo</label><div class="fx gp6">';
  GR.forEach(function(g){h+='<button data-grp="'+g+'" style="flex:1;padding:10px;border-radius:10px;background:'+(gr===g?GC[g]:"var(--lg)")+';color:'+(gr===g?"#fff":"#666")+';font-weight:800;font-size:16px">'+g+'</button>'});
  h+='</div></div><input type="hidden" id="f-gr" value="'+gr+'"><input type="hidden" id="f-eid" value="'+(eid||"")+'">';
  h+='<button class="bt" id="btn-save-m" style="background:var(--dk3)">\u2705 '+(m?"Salvar":"Cadastrar")+'</button>';
  return h;
}
function saveM(){
  var nm=document.getElementById("f-nm").value.trim();if(!nm)return alert("Nome!");
  var ap=document.getElementById("f-ap").value.trim()||null,gr=document.getElementById("f-gr").value,eid=document.getElementById("f-eid").value;
  if(eid){var m=D.membros.find(function(x){return x.id===parseInt(eid)});if(m){m.nome=nm;m.apelido=ap;m.grupo=gr}}
  else D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});
  sv();closeM();renderAll();
}
function doLote(){
  var txt=document.getElementById("f-lote").value.trim();if(!txt)return;var ok=0;
  txt.split("\n").forEach(function(l){var p=l.split(",").map(function(x){return x.trim()});if(p.length>=2){var nm=p[0],ap=p[1]||null,gr=(p[2]||"A").toUpperCase();if(GR.indexOf(gr)>=0&&nm){D.membros.push({id:D.nMid++,nome:nm,apelido:ap,grupo:gr,ativo:true});ok++}}});
  sv();closeM();renderAll();alert("\u2705 "+ok+" importados!");
}
function tFormOpen(idx){
  var t=idx!==undefined?D.tarefas[idx]:null;
  var nome=t?esc(t.nome):"",qtd=t?t.qtd:1,fase=t?t.fase:"",fixos=t?t.fixos:[];
  var tipo=t?t.tipo:fTipo;
  if(!fase)fase=FASES_PADRAO[0];
  var h='<div class="ig"><label>Tipo de escala</label><select id="f-tipo">';
  D.tiposEscala.forEach(function(tp){h+='<option value="'+esc(tp)+'"'+(tipo===tp?' selected':'')+'>'+esc(tp)+'</option>'});
  h+='</select></div>';
  h+='<div class="ig"><label>Fase</label><select id="f-fase">';
  FASES_PADRAO.forEach(function(f){h+='<option value="'+f+'"'+(fase===f?' selected':'')+'>'+f+'</option>'});
  h+='</select></div>';
  h+='<div class="ig"><label>Tarefa</label><input id="f-tnome" value="'+nome+'"></div>';
  h+='<div class="ig"><label>Qtd pessoas</label><input id="f-tqtd" type="number" min="1" value="'+qtd+'"></div>';
  h+='<div class="ig"><label>Pessoas fixas</label><div style="max-height:150px;overflow:auto;border:1px solid #e8e8e8;border-radius:10px;padding:6px">';
  atv().forEach(function(m){
    var ck=fixos.indexOf(m.id)>=0;
    h+='<div class="chk-row"><input type="checkbox" data-fixo-id="'+m.id+'"'+(ck?' checked':'')+'>';
    h+=gb(m.grupo)+' <span style="font-size:13px">'+esc(m.nome)+'</span></div>';
  });
  h+='</div></div><input type="hidden" id="f-tidx" value="'+(idx!==undefined?idx:"")+'">';
  h+='<button class="bt" id="btn-save-tarefa" style="background:var(--dk3)">\u2705 '+(t?"Salvar":"Cadastrar")+'</button>';
  openM(t?"Editar Tarefa":"Nova Tarefa",h);
}
function saveT(){
  var tipo=document.getElementById("f-tipo").value;
  var fase=document.getElementById("f-fase").value,nome=document.getElementById("f-tnome").value.trim();
  var qtd=parseInt(document.getElementById("f-tqtd").value)||1,idx=document.getElementById("f-tidx").value;
  if(!nome)return alert("Nome!");
  var fixos=[];document.querySelectorAll("[data-fixo-id]").forEach(function(cb){if(cb.checked)fixos.push(parseInt(cb.getAttribute("data-fixo-id")))});
  if(idx!==""){var t=D.tarefas[parseInt(idx)];t.tipo=tipo;t.fase=fase;t.nome=nome;t.qtd=qtd;t.fixos=fixos}
  else D.tarefas.push({tipo:tipo,fase:fase,nome:nome,qtd:qtd,fixos:fixos});
  sv();closeM();renderAll();
}
function trocaOpen(ei,mi){
  var a=atv(),at=eS.esc[ei].membros[mi];
  var h='<p style="font-size:12px;color:#666;margin:0 0 10px">Substituindo: <b>'+esc(at.nome)+'</b></p>';
  h+='<div style="max-height:250px;overflow:auto;display:flex;flex-direction:column;gap:4px">';
  a.forEach(function(m){
    h+='<button data-pick="'+m.id+'" data-ei="'+ei+'" data-mi="'+mi+'" style="padding:8px 12px;border-radius:10px;border:1px solid #eee;background:'+(m.id===at.id?"#e8f5e9":"#fff")+';display:flex;align-items:center;gap:6px;text-align:left;width:100%">';
    h+=gb(m.grupo)+'<span style="font-size:13px">'+esc(m.nome)+'</span></button>';
  });
  h+='</div>';openM("Trocar",h);
}
</script>
